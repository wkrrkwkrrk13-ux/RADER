name: Fetch Prices

on:
  workflow_dispatch:
  schedule:
    - cron: "*/10 * * * *"

permissions:
  contents: write

concurrency:
  group: fetch-prices
  cancel-in-progress: true

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run fetch script
        env:
          EODHD_API_TOKEN: ${{ secrets.EODHD_API_TOKEN }}
          EODHD_ALWAYS_VERIFY: "SPCX"
          EODHD_MAX_VERIFY: "100"
          EODHD_ANOMALY_CHANGE_ABS: "8"
          EODHD_PRICE_DIFF_PCT: "0.7"
          EODHD_CHANGE_DIFF_PCTP: "1.0"
        run: python fetch_prices.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add cache/prices.json
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update prices cache"
            git pull --rebase
            git push
          fi
