<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070c">
<title>미장 Industry Radar</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07111f;
  --bg2:#0a1424;
  --surface:#101b30;
  --surface2:#14213a;
  --surface3:#192844;
  --border:#263858;
  --border2:#34496d;
  --text:#eef3ff;
  --muted:#91a0bb;
  --muted2:#6e7d98;
  --up:#ff4d67;
  --down:#2b95ff;
  --gold:#f7c84a;
  --accent:#f7c84a;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:11px;-webkit-font-smoothing:antialiased;}

.hdr{position:sticky;top:0;z-index:100;background:rgba(7,17,31,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:17px;font-weight:950;color:var(--accent);letter-spacing:-0.5px;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px;font-weight:700;}
.hdr-right{display:flex;gap:6px;}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;}
.btn:active{opacity:0.72;transform:scale(0.98);}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(247,200,74,0.12);border-color:rgba(247,200,74,0.35);color:var(--accent);}

.date-row{padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2);}
.date-label{font-size:11px;font-weight:800;color:var(--muted2);}
.date-value{font-size:12px;font-weight:900;color:var(--accent);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}

.tab-row{display:flex;gap:6px;padding:8px 10px;background:var(--surface);border-bottom:1px solid var(--border);}
.tab{padding:6px 16px;border-radius:8px;font-size:12px;font-weight:900;background:var(--surface2);border:1px solid var(--border);color:#9aa7c4;cursor:pointer;}
.tab.active{background:rgba(247,200,74,0.16);border-color:rgba(247,200,74,0.45);color:var(--accent);}

.kr-name{color:#7fd97f!important;}
.both-block{margin-bottom:6px;}
.both-label{font-size:9px;font-weight:900;color:var(--muted2);padding:3px 4px 1px;letter-spacing:0.4px;}

.main{padding:8px;}
.grid{display:flex;gap:5px;align-items:flex-start;}
.grid.grid-vertical{flex-direction:column;align-items:center;}
.grid.grid-vertical .col{max-width:640px;width:100%;}
.col{flex:1;display:flex;flex-direction:column;gap:5px;min-width:0;}

.sc{background:#0c1627;border:2px solid #2e4a72;border-radius:8px;overflow:hidden;box-shadow:0 0 0 1px #1a2e4a;}
.sc-hdr{padding:6px 9px;display:flex;align-items:center;justify-content:space-between;background:linear-gradient(90deg,#1a3a5c 0%,#0f2040 100%);border-bottom:2px solid #2e4a72;gap:8px;}
.sc-rank{font-size:24px;font-weight:950;color:var(--gold);line-height:1;flex-shrink:0;min-width:30px;text-align:center;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;}
.sc-rank.top3{color:#fff;text-shadow:0 0 10px rgba(247,200,74,0.6);}
.sc-name-wrap{display:flex;flex-direction:column;min-width:0;overflow:hidden;flex:1;}
.sc-name{font-size:12px;font-weight:950;color:#fff;letter-spacing:-0.2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-name-kr{font-size:10px;font-weight:800;color:#9fc4ee;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.sc-right{display:flex;flex-direction:column;align-items:flex-end;flex-shrink:0;}
.sc-avg{font-size:15px;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-0.5px;line-height:1.1;}
.sc-vol{font-size:9px;font-weight:800;color:#9aa7c4;}

table{width:100%;border-collapse:collapse;}
.col-header td{color:#fff;font-size:9px;font-weight:900;border-bottom:1px solid #1a2a40;padding:2px 4px;}
td{padding:3px 4px;border-bottom:1px solid #0e1a2e;font-size:12px;font-weight:700;line-height:1.3;white-space:nowrap;}
td:first-child{overflow:hidden;text-overflow:ellipsis;font-weight:900;}
td:nth-child(2),td:nth-child(4){text-align:right;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;width:50px;}
td:nth-child(3),td:nth-child(5){text-align:right;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;font-weight:950;width:46px;}
.up{color:var(--up)!important;} .dn{color:var(--down)!important;} .fl{color:#9aa7c4!important;}
.empty{color:#2a3a52;text-align:center;padding:8px;font-size:9px;}

.overlay{position:fixed;inset:0;background:rgba(7,17,31,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.overlay.hidden{display:none;}
.spin{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;font-weight:800;color:var(--accent);}
.footer{text-align:center;font-size:10px;color:var(--muted);padding:10px;border-top:1px solid var(--border);background:var(--surface);}
@media(max-width:700px){
  .tab-row{display:none;}
}
</style>
</head>
<body>

<div class="overlay" id="ov">
  <div class="spin"></div>
  <div class="spin-txt" id="ovTxt">데이터 수집 중...</div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📡 미장 Industry Radar</div>
    <div class="hdr-sub" id="hdrSub">93개 industry · 미장 자금흐름 레이더</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn" id="refBtn" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>

<div class="date-row">
  <span class="date-label">📌 기준 종가:</span>
  <span class="date-value" id="dateDisplay">—</span>
</div>

<div class="tab-row" id="tabRow">
  <div class="tab active" data-tab="us" onclick="setTab('us')">🇺🇸 미장</div>
  <div class="tab" data-tab="kr" onclick="setTab('kr')">🇰🇷 국장</div>
  <div class="tab" data-tab="both" onclick="setTab('both')">🌐 미장+국장</div>
</div>

<div class="main"><div class="grid" id="grid"></div></div>
<div class="footer" id="footer"></div>

let closeData={}, allData={}, liveData={};
let krCloseData={}, krAllData={}, krLiveData={};
let closeDataLoaded=false;
let closeDataDateKey=null;
let currentTab='us';

function fmtC(c){if(c==null)return'N/A';const s=c>=0?'+':'';return s+c.toFixed(1)+'%';}
function fmtP(p){if(p==null)return'';return'$'+(p>=100?p.toFixed(0):p.toFixed(2));}
function fmtPKR(p){if(p==null)return'';return p.toLocaleString('ko-KR');}
function cls(c){if(c==null)return'fl';return c>0.1?'up':c<-0.1?'dn':'fl';}

function sectorAvg(tickers,data){
  data=data||closeData;
  let weightedSum=0,totalWeight=0;
  tickers.forEach(s=>{
    const d=data[s];
    if(d?.change==null)return;
    const weight=(d.volume||0)*(d.price||0);
    if(weight<=0)return;
    weightedSum+=d.change*weight;
    totalWeight+=weight;
  });
  return totalWeight>0?weightedSum/totalWeight:null;
}

function buildCloseData(data){
  const out={};
  Object.entries(data||{}).forEach(([sym,d])=>{
    if(!d){ out[sym]=null; return; }
    out[sym]={price:d.price,change:d.change,volume:d.volume,live_price:d.live_price,live_change:d.live_change};
  });
  return out;
}

function buildLiveData(data){
  const out={};
  Object.entries(data||{}).forEach(([sym,d])=>{
    if(!d){ out[sym]=null; return; }
    out[sym]={price:d.live_price??d.price,change:d.live_change??d.change,volume:d.volume,live_price:d.live_price,live_change:d.live_change};
  });
  return out;
}

function fmtVolUSD(tickers,data){
  // 거래대금 = sum(price*volume), 단위: 억달러
  let total=0;
  tickers.forEach(sym=>{
    const d=data[sym];
    if(d?.price==null||!d?.volume)return;
    total+=d.price*d.volume;
  });
  if(total<=0)return null;
  const eok=total/1e8; // 1억 단위
  if(eok>=1)return eok.toFixed(1)+'억$';
  return (total/1e6).toFixed(0)+'백만$';
}

function getNumCols(){
  const w=window.innerWidth;
  if(w<700)return 1;
  if(w<1000)return 2;
  if(w<1300)return 3;
  if(w<1700)return 4;
  if(w<2000)return 5;
  return 6;
}

function sortByChangeDesc(items, getChange){
  return [...items].sort((a,b)=>{
    const ca=getChange(a), cb=getChange(b);
    if(ca==null&&cb==null)return 0;
    if(ca==null)return 1;
    if(cb==null)return -1;
    return cb-ca;
  });
}

function renderUsRows(s){
  const sorted=sortByChangeDesc(s.t, sym=>closeData[sym]?.change);
  return sorted.map(sym=>{
    const cd=closeData[sym];
    const ld=liveData[sym];
    const prevPrice=cd?.price, prevChange=cd?.change;
    const curPrice=ld?.price, curChange=ld?.change;
    if(prevPrice==null)return`<tr><td>${sym}</td><td colspan="4" style="color:#3a4a68;">데이터없음</td></tr>`;
    return `<tr>
      <td>${sym}</td>
      <td class="${cls(prevChange)}">${fmtP(prevPrice)}</td>
      <td class="${cls(prevChange)}">${fmtC(prevChange)}</td>
      <td class="${cls(curChange)}">${fmtP(curPrice??prevPrice)}</td>
      <td class="${cls(curChange)}">${fmtC(curChange)}</td>
    </tr>`;
  }).join('');
}

function renderKrRows(s){
  if(!s.k||!s.k.length)return `<tr><td colspan="5" class="empty">매칭 국장 종목 없음</td></tr>`;
  const sorted=sortByChangeDesc(s.k, stock=>krCloseData[stock.y]?.change);
  return sorted.map(stock=>{
    const sym=stock.y;
    const cd=krCloseData[sym];
    const ld=krLiveData[sym];
    const prevPrice=cd?.price, prevChange=cd?.change;
    const curPrice=ld?.price, curChange=ld?.change;
    if(prevPrice==null)return`<tr><td class="kr-name" title="${stock.n}">${stock.n}</td><td colspan="4" style="color:#3a4a68;">데이터없음</td></tr>`;
    return `<tr>
      <td class="kr-name" title="${stock.n}">${stock.n}</td>
      <td class="${cls(prevChange)}">${fmtPKR(prevPrice)}</td>
      <td class="${cls(prevChange)}">${fmtC(prevChange)}</td>
      <td class="${cls(curChange)}">${fmtPKR(curPrice??prevPrice)}</td>
      <td class="${cls(curChange)}">${fmtC(curChange)}</td>
    </tr>`;
  }).join('');
}

function tableHeader(){
  return `<tr class="col-header"><td>종목명</td><td>전일종가</td><td>전일등락률</td><td>현재가</td><td>현재등락률</td></tr>`;
}

function renderMain(){
  // 순위는 항상 미장(closeData) 기준으로 고정
  const avgs=SECTORS.map(s=>({...s,avg:sectorAvg(s.t,closeData)}))
    .sort((a,b)=>{
      if(a.avg==null&&b.avg==null)return 0;
      if(a.avg==null)return 1;
      if(b.avg==null)return -1;
      return b.avg-a.avg;
    });
  sortedSectors=avgs;

  const grid=document.getElementById('grid');

  if(currentTab==='both'){
    // 세로 1열, 카드 안에 미장 표 -> 국장 표 순서
    grid.className='grid grid-vertical';
    const cardsHtml=avgs.map((s,idx)=>{
      const rank=idx+1;
      const sign=s.avg!=null&&s.avg>=0?'+':'';
      const avgC=cls(s.avg);
      const volStr=fmtVolUSD(s.t,closeData);
      return `<div class="sc" data-name="${s.n}">
        <div class="sc-hdr">
          <span class="sc-rank${rank<=3?' top3':''}">${rank}</span>
          <div class="sc-name-wrap">
            <span class="sc-name">${s.n}</span>
            <span class="sc-name-kr">${s.kr||''}</span>
          </div>
          <div class="sc-right">
            <span class="sc-avg ${avgC}">${s.avg!=null?sign+s.avg.toFixed(1)+'%':'N/A'}</span>
            <span class="sc-vol">${volStr||''}</span>
          </div>
        </div>
        <div class="both-block">
          <div class="both-label">🇺🇸 미장</div>
          <table>${tableHeader()}${renderUsRows(s)}</table>
        </div>
        <div class="both-block">
          <div class="both-label">🇰🇷 국장</div>
          <table>${tableHeader()}${renderKrRows(s)}</table>
        </div>
      </div>`;
    }).join('');
    grid.innerHTML=`<div class="col">${cardsHtml}</div>`;
    return;
  }

  // 미장 또는 국장 단독 탭: 가로 신문칼럼
  grid.className='grid';
  const cardsHtml=avgs.map((s,idx)=>{
    const rank=idx+1;
    const sign=s.avg!=null&&s.avg>=0?'+':'';
    const avgC=cls(s.avg);
    const volStr=currentTab==='us'?fmtVolUSD(s.t,closeData):'';
    const rows=currentTab==='kr'?renderKrRows(s):renderUsRows(s);
    return `<div class="sc" data-name="${s.n}">
      <div class="sc-hdr">
        <span class="sc-rank${rank<=3?' top3':''}">${rank}</span>
        <div class="sc-name-wrap">
          <span class="sc-name">${s.n}</span>
          <span class="sc-name-kr">${s.kr||''}</span>
        </div>
        <div class="sc-right">
          <span class="sc-avg ${avgC}">${s.avg!=null?sign+s.avg.toFixed(1)+'%':'N/A'}</span>
          <span class="sc-vol">${volStr||''}</span>
        </div>
      </div>
      <table>
        ${tableHeader()}
        ${rows}
      </table>
    </div>`;
  }).join('');

  // 신문 칼럼 분배 (화면 폭에 따라 동적 열 수)
  const tmp=document.createElement('div');
  tmp.innerHTML=cardsHtml;
  const cardEls=Array.from(tmp.children);
  grid.innerHTML='';
  const numCols=getNumCols();
  const cols=[];
  for(let i=0;i<numCols;i++){
    const c=document.createElement('div');
    c.className='col';
    grid.appendChild(c);
    cols.push(c);
  }
  cardEls.forEach((el,i)=>cols[i%numCols].appendChild(el));
}

function setTab(tab){
  currentTab=tab;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active',t.dataset.tab===tab));
  renderMain();
}

function getEffectiveTab(){
  // 모바일(700px 이하)에서는 무조건 both
  if(window.innerWidth<=700)return 'both';
  return currentTab;
}

window.addEventListener('resize',()=>{
  clearTimeout(window._resizeTimer);
  window._resizeTimer=setTimeout(()=>{
    const eff=getEffectiveTab();
    const prevTab=currentTab;
    currentTab=eff;
    renderMain();
    currentTab=prevTab; // 탭 버튼 상태(active)는 사용자가 고른 탭 그대로 유지
  },250);
});

async function fetchAll(syms,endpoint){
  endpoint=endpoint||'/api/quote';
  const res={};
  const batchSize=20;
  for(let i=0;i<syms.length;i+=batchSize){
    const b=syms.slice(i,i+batchSize);
    document.getElementById('ovTxt').textContent=`수집 중... ${i}/${syms.length}`;
    try{
      const r=await fetch(`${endpoint}?symbols=${b.join(',')}`);
      if(r.ok){
        const d=await r.json();
        b.forEach(s=>{
          if(d[s]&&d[s].price!=null)res[s]={price:d[s].price,change:d[s].change,volume:d[s].volume,live_price:d[s].live_price,live_change:d[s].live_change};
          else res[s]=null;
        });
      } else { b.forEach(s=>res[s]=null); }
    }catch{ b.forEach(s=>res[s]=null); }
    if(i+batchSize<syms.length)await new Promise(r=>setTimeout(r,200));
  }
  return res;
}

function isUsDST(date){
  const year=date.getUTCFullYear();
  const mar=new Date(Date.UTC(year,2,1));
  const secondSundayMarch=8+(7-mar.getUTCDay())%7;
  const dstStart=new Date(Date.UTC(year,2,secondSundayMarch,7));
  const nov=new Date(Date.UTC(year,10,1));
  const firstSundayNovember=1+(7-nov.getUTCDay())%7;
  const dstEnd=new Date(Date.UTC(year,10,firstSundayNovember,6));
  return date>=dstStart && date<dstEnd;
}

function getUsCloseDate(now=new Date()){
  const kst=new Date(now.getTime()+9*60*60*1000);
  const krHour=kst.getUTCHours();
  const closeHour=isUsDST(now)?5:6;
  if(krHour<closeHour)kst.setUTCDate(kst.getUTCDate()-1);
  kst.setUTCDate(kst.getUTCDate()-1);
  let dow=kst.getUTCDay();
  if(dow===0)kst.setUTCDate(kst.getUTCDate()-2);
  if(dow===6)kst.setUTCDate(kst.getUTCDate()-1);
  return kst.toISOString().slice(0,10);
}

async function loadData(){
  const ov=document.getElementById('ov');
  const btn=document.getElementById('refBtn');
  ov.classList.remove('hidden');
  btn.classList.add('loading');
  try{
    // 1) 미장
    const syms=[...new Set(SECTORS.flatMap(s=>s.t))];
    allData=await fetchAll(syms,'/api/quote');
    const dateKey=getUsCloseDate();
    if(!closeDataLoaded || closeDataDateKey!==dateKey){
      closeData=buildCloseData(allData);
      closeDataLoaded=true;
      closeDataDateKey=dateKey;
    }
    liveData=buildLiveData(allData);
    const ok=Object.values(allData).filter(v=>v).length;

    // 2) 국장
    const krSyms=[...new Set(SECTORS.flatMap(s=>(s.k||[]).map(st=>st.y)))];
    krAllData=await fetchAll(krSyms,'/api/kr_quote');
    krCloseData=buildCloseData(krAllData);
    krLiveData=buildLiveData(krAllData);
    const krOk=Object.values(krAllData).filter(v=>v).length;

    document.getElementById('hdrSub').textContent=`93개 industry · 미장 ${ok}개 · 국장 ${krOk}개 수집완료`;
    document.getElementById('dateDisplay').textContent=closeDataDateKey+' 종가';
    document.getElementById('footer').textContent=`업데이트: ${new Date().toLocaleString('ko-KR')} | 미장 ${ok}/${syms.length} · 국장 ${krOk}/${krSyms.length}`;
    renderMain();
  }catch(e){alert('오류: '+e.message);}
  finally{
    setTimeout(()=>ov.classList.add('hidden'),300);
    btn.classList.remove('loading');
  }
}

function downloadCSV(){
  const rows=[['날짜','순위','industry','industry등락률%','종목','전일종가','현재가','등락률%','거래량']];
  const today=closeDataDateKey||getUsCloseDate();
  const list=sortedSectors.length?sortedSectors:SECTORS;
  list.forEach((s,idx)=>s.t.forEach(sym=>{
    const d=closeData[sym];
    rows.push([
      today,
      idx+1,
      s.n,
      s.avg!=null?s.avg.toFixed(2):'',
      sym,
      d?.price!=null?d.price.toFixed(2):'',
      d?.live_price!=null?d.live_price.toFixed(2):'',
      d?.change!=null?d.change.toFixed(2):'',
      d?.volume||''
    ]);
  }));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`us_radar_gics_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

if(window.innerWidth<=700){
  currentTab='both';
}
loadData();
</script>
