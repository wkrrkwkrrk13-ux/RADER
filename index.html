<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0a0f">
<title>미장 레이더</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --border: #1e1e2e;
    --text: #e0e0f0;
    --muted: #555577;
    --up: #ff4455;
    --down: #2299ff;
    --flat: #666688;
    --accent: #f0c040;
    --sector-header: #1a1a28;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'SF Pro Display', -apple-system, 'Malgun Gothic', sans-serif;
    min-height: 100vh;
  }

  /* 헤더 */
  .header {
    position: sticky;
    top: 0;
    z-index: 100;
    background: var(--bg);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .header-left h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: -0.3px;
    color: var(--accent);
  }

  .header-left .subtitle {
    font-size: 11px;
    color: var(--muted);
    margin-top: 1px;
  }

  .refresh-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 8px 16px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
    display: flex;
    align-items: center;
    gap: 6px;
    white-space: nowrap;
  }

  .refresh-btn:active { opacity: 0.7; }
  .refresh-btn.loading { opacity: 0.5; pointer-events: none; }

  /* 섹터 강도 요약 */
  .summary-bar {
    padding: 12px 16px;
    display: flex;
    gap: 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .summary-bar::-webkit-scrollbar { display: none; }

  .summary-chip {
    flex-shrink: 0;
    padding: 5px 10px;
    border-radius: 20px;
    font-size: 11px;
    font-weight: 600;
    border: 1px solid transparent;
    cursor: pointer;
  }

  .summary-chip.up { background: rgba(255,68,85,0.15); border-color: rgba(255,68,85,0.3); color: var(--up); }
  .summary-chip.down { background: rgba(34,153,255,0.15); border-color: rgba(34,153,255,0.3); color: var(--down); }

  /* 섹터 순위 */
  .ranking-section {
    margin: 12px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .ranking-title {
    padding: 10px 14px;
    font-size: 12px;
    font-weight: 700;
    color: var(--accent);
    border-bottom: 1px solid var(--border);
    letter-spacing: 0.5px;
  }

  .ranking-item {
    display: flex;
    align-items: center;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    gap: 10px;
  }

  .ranking-item:last-child { border-bottom: none; }

  .rank-num {
    font-size: 11px;
    color: var(--muted);
    width: 20px;
  }

  .rank-name {
    flex: 1;
    font-size: 12px;
    color: var(--text);
  }

  .rank-bar-wrap {
    width: 80px;
    height: 4px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .rank-bar {
    height: 100%;
    border-radius: 2px;
    transition: width 0.5s ease;
  }

  .rank-val {
    font-size: 12px;
    font-weight: 700;
    width: 50px;
    text-align: right;
  }

  /* 필터 탭 */
  .filter-tabs {
    padding: 8px 16px;
    display: flex;
    gap: 6px;
    overflow-x: auto;
    scrollbar-width: none;
  }

  .filter-tabs::-webkit-scrollbar { display: none; }

  .filter-tab {
    flex-shrink: 0;
    padding: 5px 12px;
    border-radius: 6px;
    font-size: 11px;
    font-weight: 600;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    cursor: pointer;
  }

  .filter-tab.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
  }

  /* 섹터 카드 */
  .sectors {
    padding: 8px 16px 80px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sector-card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
  }

  .sector-header {
    padding: 10px 14px;
    background: var(--sector-header);
    display: flex;
    align-items: center;
    justify-content: space-between;
    cursor: pointer;
  }

  .sector-name {
    font-size: 13px;
    font-weight: 700;
    color: var(--accent);
  }

  .sector-avg {
    font-size: 13px;
    font-weight: 700;
  }

  /* 종목 행 */
  .ticker-row {
    display: flex;
    align-items: flex-start;
    padding: 8px 14px;
    border-bottom: 1px solid var(--border);
    gap: 8px;
  }

  .ticker-row:last-child { border-bottom: none; }

  .ticker-symbol {
    font-size: 13px;
    font-weight: 700;
    width: 52px;
    flex-shrink: 0;
  }

  .ticker-change {
    font-size: 13px;
    font-weight: 700;
    width: 52px;
    flex-shrink: 0;
    text-align: right;
  }

  .ticker-info {
    flex: 1;
    min-width: 0;
  }

  .ticker-desc {
    font-size: 11px;
    color: var(--muted);
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ticker-kr {
    font-size: 11px;
    color: #8888aa;
    margin-top: 2px;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .ticker-vol {
    font-size: 10px;
    color: var(--muted);
    width: 44px;
    text-align: right;
    flex-shrink: 0;
    align-self: center;
  }

  .up { color: var(--up); }
  .down { color: var(--down); }
  .flat { color: var(--flat); }

  /* 로딩 */
  .loading-overlay {
    position: fixed;
    inset: 0;
    background: rgba(10,10,15,0.9);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 999;
    gap: 16px;
  }

  .loading-overlay.hidden { display: none; }

  .spinner {
    width: 40px;
    height: 40px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
  }

  @keyframes spin { to { transform: rotate(360deg); } }

  .loading-text {
    font-size: 14px;
    color: var(--muted);
  }

  /* 에러 */
  .error-msg {
    margin: 20px 16px;
    padding: 14px;
    background: rgba(255,68,85,0.1);
    border: 1px solid rgba(255,68,85,0.3);
    border-radius: 8px;
    font-size: 13px;
    color: var(--up);
    display: none;
  }

  /* 마지막 업데이트 */
  .last-updated {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    padding: 8px;
  }

  /* 날짜 선택 */
  .date-row {
    padding: 8px 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  .date-label { font-size: 12px; color: var(--muted); }

  .date-input {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 5px 10px;
    border-radius: 6px;
    font-size: 12px;
  }
</style>
</head>
<body>

<div class="loading-overlay" id="loadingOverlay">
  <div class="spinner"></div>
  <div class="loading-text" id="loadingText">데이터 수집 중...</div>
</div>

<div class="header">
  <div class="header-left">
    <h1>📡 미장 레이더</h1>
    <div class="subtitle" id="headerSubtitle">32섹터 · 국장 매핑</div>
  </div>
  <button class="refresh-btn" id="refreshBtn" onclick="loadData()">
    🔄 새로고침
  </button>
</div>

<div class="date-row">
  <span class="date-label">기준일:</span>
  <input type="date" class="date-input" id="dateInput">
  <button class="refresh-btn" onclick="loadData()" style="padding:5px 12px;font-size:12px;">조회</button>
</div>

<div class="summary-bar" id="summaryBar"></div>

<div class="ranking-section">
  <div class="ranking-title">⚡ 섹터 강도 순위</div>
  <div id="rankingList"></div>
</div>

<div class="filter-tabs" id="filterTabs">
  <div class="filter-tab active" onclick="filterSector('all', this)">전체</div>
  <div class="filter-tab" onclick="filterSector('up', this)">상승↑</div>
  <div class="filter-tab" onclick="filterSector('down', this)">하락↓</div>
</div>

<div class="error-msg" id="errorMsg"></div>
<div class="sectors" id="sectorsContainer"></div>
<div class="last-updated" id="lastUpdated"></div>

    ["AA","알루미늄","조일알미늄/POSCO홀딩스"],
    ["RIO","글로벌광산","POSCO홀딩스/고려아연"],
    ["SCCO","구리채굴","풍산/이구산업/대창"],
    ["NUE","철강 대장","POSCO홀딩스/현대제철"],
    ["CLF","철강/광산","POSCO홀딩스/현대제철"],
  ]},
];

// ─────────────────────────────────────────────
// 유틸
// ─────────────────────────────────────────────
function fmtVol(v) {
  if (!v || v === 0) return 'N/A';
  if (v >= 1e9) return (v/1e9).toFixed(1)+'B';
  if (v >= 1e6) return (v/1e6).toFixed(1)+'M';
  if (v >= 1e3) return (v/1e3).toFixed(0)+'K';
  return v.toString();
}

function fmtChange(c) {
  if (c === null || c === undefined) return 'N/A';
  const sign = c >= 0 ? '+' : '';
  return `${sign}${c.toFixed(1)}%`;
}

function changeClass(c) {
  if (c === null || c === undefined) return 'flat';
  if (c > 0) return 'up';
  if (c < 0) return 'down';
  return 'flat';
}

// ─────────────────────────────────────────────
// 날짜 초기화
// ─────────────────────────────────────────────
function initDate() {
  const input = document.getElementById('dateInput');
  const today = new Date();
  const day = today.getDay();
  // 주말이면 금요일로
  const offset = day === 0 ? 2 : day === 6 ? 1 : 0;
  today.setDate(today.getDate() - offset - 1);
  input.value = today.toISOString().split('T')[0];
}

// ─────────────────────────────────────────────
// Yahoo Finance API 호출
// ─────────────────────────────────────────────
async function fetchTickerData(symbols) {
  const results = {};
  // Yahoo Finance v8 API (CORS 허용)
  const batchSize = 20;
  for (let i = 0; i < symbols.length; i += batchSize) {
    const batch = symbols.slice(i, i + batchSize);
    const promises = batch.map(async (sym) => {
      try {
        const url = `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
        const res = await fetch(url, { headers: { 'Accept': 'application/json' } });
        if (!res.ok) return [sym, null];
        const data = await res.json();
        const result = data?.chart?.result?.[0];
        if (!result) return [sym, null];
        const closes = result.indicators?.quote?.[0]?.close;
        const volumes = result.indicators?.quote?.[0]?.volume;
        if (!closes || closes.length < 2) return [sym, null];
        // 유효한 값만 필터
        const validCloses = closes.filter(v => v !== null && v !== undefined);
        const validVols = volumes ? volumes.filter(v => v !== null && v !== undefined) : [];
        if (validCloses.length < 2) return [sym, null];
        const prev = validCloses[validCloses.length - 2];
        const last = validCloses[validCloses.length - 1];
        const vol = validVols[validVols.length - 1] || 0;
        const change = ((last - prev) / prev) * 100;
        return [sym, { price: last, change, volume: vol }];
      } catch {
        return [sym, null];
      }
    });
    const batchResults = await Promise.all(promises);
    batchResults.forEach(([sym, val]) => { results[sym] = val; });
    // 배치 간 딜레이
    if (i + batchSize < symbols.length) {
      await new Promise(r => setTimeout(r, 300));
    }
  }
  return results;
}

// ─────────────────────────────────────────────
// 렌더링
// ─────────────────────────────────────────────
let allData = {};
let currentFilter = 'all';

function renderAll() {
  renderSummary();
  renderRanking();
  renderSectors();
}

function renderSummary() {
  const bar = document.getElementById('summaryBar');
  const sectorAvgs = calcSectorAvgs();
  const sorted = Object.entries(sectorAvgs).sort((a,b) => b[1]-a[1]).slice(0, 12);
  bar.innerHTML = sorted.map(([name, avg]) => {
    const cls = avg >= 0 ? 'up' : 'down';
    const sign = avg >= 0 ? '+' : '';
    const short = name.split('.').pop().trim().substring(0,8);
    return `<div class="summary-chip ${cls}" onclick="scrollToSector('${name}')">${short} ${sign}${avg.toFixed(1)}%</div>`;
  }).join('');
}

function calcSectorAvgs() {
  const avgs = {};
  SECTORS.forEach(s => {
    const changes = s.tickers.map(([sym]) => allData[sym]?.change).filter(v => v !== null && v !== undefined);
    if (changes.length > 0) avgs[s.name] = changes.reduce((a,b) => a+b, 0) / changes.length;
  });
  return avgs;
}

function renderRanking() {
  const avgs = calcSectorAvgs();
  const sorted = Object.entries(avgs).sort((a,b) => b[1]-a[1]);
  const maxAbs = Math.max(...sorted.map(([,v]) => Math.abs(v)), 1);
  const list = document.getElementById('rankingList');
  list.innerHTML = sorted.map(([name, avg], i) => {
    const cls = avg >= 0 ? 'up' : 'down';
    const sign = avg >= 0 ? '+' : '';
    const barW = Math.round((Math.abs(avg) / maxAbs) * 100);
    const barColor = avg >= 0 ? '#ff4455' : '#2299ff';
    const short = name.replace(/^[A-Z]\. /, '');
    return `
      <div class="ranking-item" onclick="scrollToSector('${name}')">
        <span class="rank-num">${i+1}</span>
        <span class="rank-name">${short}</span>
        <div class="rank-bar-wrap"><div class="rank-bar" style="width:${barW}%;background:${barColor}"></div></div>
        <span class="rank-val ${cls}">${sign}${avg.toFixed(1)}%</span>
      </div>`;
  }).join('');
}

function renderSectors() {
  const container = document.getElementById('sectorsContainer');
  const sectorAvgs = calcSectorAvgs();
  container.innerHTML = SECTORS.map(s => {
    const avg = sectorAvgs[s.name];
    const avgStr = avg !== undefined ? fmtChange(avg) : 'N/A';
    const avgCls = avg !== undefined ? changeClass(avg) : 'flat';
    const id = 'sector-' + s.name.replace(/[^a-zA-Z0-9]/g, '_');

    if (currentFilter === 'up' && (avg === undefined || avg <= 0)) return '';
    if (currentFilter === 'down' && (avg === undefined || avg >= 0)) return '';

    const rows = s.tickers.map(([sym, desc, kr]) => {
      const d = allData[sym];
      const chg = d?.change;
      const vol = d?.volume;
      const cls = changeClass(chg);
      return `
        <div class="ticker-row">
          <span class="ticker-symbol ${cls}">${sym}</span>
          <span class="ticker-change ${cls}">${fmtChange(chg)}</span>
          <div class="ticker-info">
            <div class="ticker-desc">${desc}</div>
            <div class="ticker-kr">→ ${kr}</div>
          </div>
          <span class="ticker-vol">${fmtVol(vol)}</span>
        </div>`;
    }).join('');

    return `
      <div class="sector-card" id="${id}">
        <div class="sector-header" onclick="toggleSector(this)">
          <span class="sector-name">${s.name}</span>
          <span class="sector-avg ${avgCls}">${avgStr}</span>
        </div>
        <div class="sector-body">${rows}</div>
      </div>`;
  }).join('');
}

function toggleSector(header) {
  const body = header.nextElementSibling;
  body.style.display = body.style.display === 'none' ? '' : 'none';
}

function scrollToSector(name) {
  const id = 'sector-' + name.replace(/[^a-zA-Z0-9]/g, '_');
  const el = document.getElementById(id);
  if (el) el.scrollIntoView({ behavior: 'smooth', block: 'start' });
}

function filterSector(type, btn) {
  currentFilter = type;
  document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
  btn.classList.add('active');
  renderSectors();
}

// ─────────────────────────────────────────────
// 메인 로드
// ─────────────────────────────────────────────
async function loadData() {
  const overlay = document.getElementById('loadingOverlay');
  const loadingText = document.getElementById('loadingText');
  const errorMsg = document.getElementById('errorMsg');
  const refreshBtn = document.getElementById('refreshBtn');

  overlay.classList.remove('hidden');
  refreshBtn.classList.add('loading');
  errorMsg.style.display = 'none';

  try {
    // 전체 티커 수집
    const allSymbols = [...new Set(SECTORS.flatMap(s => s.tickers.map(t => t[0])))];
    loadingText.textContent = `데이터 수집 중... (${allSymbols.length}개 종목)`;

    allData = await fetchTickerData(allSymbols);

    const successCount = Object.values(allData).filter(v => v !== null).length;
    loadingText.textContent = `완료! ${successCount}개 수집`;

    renderAll();

    const now = new Date();
    document.getElementById('lastUpdated').textContent =
      `마지막 업데이트: ${now.toLocaleString('ko-KR')} | 성공 ${successCount}/${allSymbols.length}개`;
    document.getElementById('headerSubtitle').textContent =
      `32섹터 · ${successCount}개 수집 완료`;

  } catch(e) {
    errorMsg.style.display = 'block';
    errorMsg.textContent = `데이터 수집 오류: ${e.message}`;
  } finally {
    setTimeout(() => overlay.classList.add('hidden'), 500);
    refreshBtn.classList.remove('loading');
  }
}

// 초기화
initDate();
loadData();
</script>
</body>
</html>
