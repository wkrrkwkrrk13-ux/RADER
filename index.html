<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0a0a12">
<title>미장 레이더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0a0a12;
  --surface:#111120;
  --border:#1e1e32;
  --text:#d8d8f0;
  --muted:#55556a;
  --up:#ff3348;
  --down:#1a8cff;
  --gold:#f0c040;
  --accent:#f0c040;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:11px;}

/* 헤더 */
.hdr{position:sticky;top:0;z-index:100;background:var(--bg);border-bottom:1px solid var(--border);padding:6px 10px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:14px;font-weight:700;color:var(--accent);}
.hdr-sub{font-size:10px;color:var(--muted);}
.hdr-right{display:flex;gap:6px;}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:6px;font-size:11px;cursor:pointer;}
.btn:active{opacity:0.7;}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(240,192,64,0.15);border-color:rgba(240,192,64,0.4);color:var(--accent);}

/* 날짜 */
.date-row{padding:4px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.date-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:3px 8px;border-radius:5px;font-size:11px;}

/* ── 대시보드 상단 ── */
.dashboard{padding:8px 10px;display:flex;flex-direction:column;gap:8px;border-bottom:2px solid var(--border);}

/* 섹터 TOP5 */
.top-section{background:var(--surface);border:1px solid var(--border);border-radius:10px;overflow:hidden;}
.top-title{padding:6px 12px;font-size:11px;font-weight:700;color:var(--accent);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;}
.top5-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);}
.top5-item{padding:8px 10px;background:var(--surface);text-align:center;cursor:pointer;}
.top5-medal{font-size:16px;display:block;line-height:1;}
.top5-name{font-size:9px;color:var(--muted);margin:2px 0;display:block;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top5-val{font-size:13px;font-weight:800;}

/* 오늘의 대장주 */
.leaders-grid{display:grid;grid-template-columns:repeat(5,1fr);gap:1px;background:var(--border);}
@media(max-width:600px){.leaders-grid{grid-template-columns:repeat(3,1fr);} .top5-grid{grid-template-columns:repeat(5,1fr);}}
.leader-item{padding:6px 8px;background:var(--surface);}
.leader-sym{font-size:12px;font-weight:800;}
.leader-chg{font-size:12px;font-weight:800;}
.leader-kr{font-size:9px;color:#8888bb;margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}

/* 국장 수혜주 */
.kr-section{background:var(--surface);border:1px solid rgba(240,192,64,0.3);border-radius:10px;overflow:hidden;}
.kr-title{padding:6px 12px;font-size:11px;font-weight:700;color:var(--accent);border-bottom:1px solid rgba(240,192,64,0.2);background:rgba(240,192,64,0.05);}
.kr-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:1px;background:var(--border);}
@media(max-width:600px){.kr-grid{grid-template-columns:repeat(2,1fr);}}
.kr-item{padding:7px 10px;background:var(--surface);}
.kr-sector{font-size:9px;color:var(--muted);margin-bottom:3px;}
.kr-trigger{font-size:10px;font-weight:700;color:var(--up);margin-bottom:2px;}
.kr-stocks{font-size:10px;color:var(--gold);font-weight:600;line-height:1.5;}

/* 필터 토글 */
.filter-row{padding:5px 10px;display:flex;gap:5px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);flex-wrap:wrap;}
.filter-row::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:4px 12px;border-radius:5px;font-size:10px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;white-space:nowrap;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* 섹터 목록 */
.main{padding:8px 10px 60px;display:flex;flex-direction:column;gap:8px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.sc-hdr{padding:6px 10px;display:flex;align-items:center;justify-content:space-between;background:#141425;border-bottom:1px solid var(--border);}
.sc-name{font-size:11px;font-weight:700;color:var(--accent);}
.sc-avg{font-size:12px;font-weight:800;}
.tk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:1px;background:var(--border);}
@media(max-width:600px){.tk-grid{grid-template-columns:repeat(2,1fr);}}
@media(min-width:1400px){.tk-grid{grid-template-columns:repeat(8,1fr);}}

/* 종목 카드 */
.tk{padding:6px 8px;background:var(--surface);display:flex;flex-direction:column;gap:1px;border:1px solid transparent;}
.tk.c1{background:rgba(255,51,72,0.08);}
.tk.c2{background:rgba(255,51,72,0.18);}
.tk.c3{background:rgba(255,51,72,0.30);border-color:var(--up);}
.tk.c4{background:rgba(240,192,64,0.20);border-color:var(--gold);}
.tk.d1{background:rgba(26,140,255,0.08);}
.tk.d2{background:rgba(26,140,255,0.18);}
.tk.d3{background:rgba(26,140,255,0.30);border-color:var(--down);}
.tk-top{display:flex;justify-content:space-between;align-items:center;}
.tk-sym{font-size:12px;font-weight:800;}
.tk-chg{font-size:12px;font-weight:800;}
.tk-desc{font-size:9px;color:var(--muted);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;margin-top:1px;}
.tk-kr{font-size:9px;color:var(--gold);font-weight:600;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:2px 4px;background:rgba(240,192,64,0.07);border-radius:3px;margin-top:2px;}
.tk-vol{font-size:9px;color:var(--muted);margin-top:1px;}

.up{color:var(--up);}
.dn{color:var(--down);}
.fl{color:#666680;}
.gold{color:var(--gold);}

/* 로딩 */
.overlay{position:fixed;inset:0;background:rgba(10,10,18,0.93);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.overlay.hidden{display:none;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;color:var(--muted);}
.footer{text-align:center;font-size:10px;color:var(--muted);padding:6px;}
</style>
</head>
<body>

<div class="overlay" id="ov">
  <div class="spin"></div>
  <div class="spin-txt" id="ovTxt">데이터 수집 중...</div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📡 미장 레이더</div>
    <div class="hdr-sub" id="hdrSub">32섹터 · 국장 매핑</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn" id="refBtn" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>

<div class="date-row">
  <span style="color:var(--muted);font-size:10px;">기준일:</span>
  <input type="date" class="date-input" id="dateInput">
  <button class="btn" onclick="loadData()" style="padding:3px 8px;">조회</button>
</div>

<!-- 대시보드 -->
<div class="dashboard">
  <!-- 섹터 TOP5 -->
  <div class="top-section">
    <div class="top-title"><span>⚡ 오늘의 자금 흐름</span><span style="color:var(--muted);font-weight:400;">섹터 강도 순위</span></div>
    <div class="top5-grid" id="top5Grid"></div>
  </div>
  <!-- 오늘의 대장주 -->
  <div class="top-section">
    <div class="top-title"><span>🔥 오늘의 대장주 TOP10</span></div>
    <div class="leaders-grid" id="leadersGrid"></div>
  </div>
  <!-- 국장 수혜주 -->
  <div class="kr-section">
    <div class="kr-title">🎯 국장 예상 수혜주 (강세 섹터 기준)</div>
    <div class="kr-grid" id="krGrid"></div>
  </div>
</div>

<div class="filter-row">
  <div class="ftab active" onclick="setFilter('all',this)">전체</div>
  <div class="ftab" onclick="setFilter('kr',this)">국장영향</div>
  <div class="ftab" onclick="setFilter('semi',this)">반도체</div>
  <div class="ftab" onclick="setFilter('ai',this)">AI/클라우드</div>
  <div class="ftab" onclick="setFilter('energy',this)">에너지/원전</div>
  <div class="ftab" onclick="setFilter('defense',this)">방산/우주</div>
  <div class="ftab" onclick="setFilter('bio',this)">바이오</div>
  <div class="ftab" onclick="setFilter('up',this)">상승↑</div>
  <div class="ftab" onclick="setFilter('dn',this)">하락↓</div>
</div>

<div class="main" id="main"></div>
<div class="footer" id="footer"></div>

function fmtC(c){if(c==null)return'N/A';const s=c>=0?'+':'';return s+c.toFixed(1)+'%';}
function fmtV(v){if(!v)return'';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return v;}
function cls(c){if(c==null)return'fl';return c>0.1?'up':c<-0.1?'dn':'fl';}

function intensityCls(c){
  if(c==null)return'';
  if(c>=10)return'c4';
  if(c>=5)return'c3';
  if(c>=2)return'c2';
  if(c>=0.5)return'c1';
  if(c<=-5)return'd3';
  if(c<=-2)return'd2';
  if(c<=-0.5)return'd1';
  return'';
}

function sectorAvg(tickers){
  const vals=tickers.map(([s])=>allData[s]?.change).filter(v=>v!=null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}
