<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07070c">
<title>미장 레이더 Terminal</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#07111f;
  --bg2:#0a1424;
  --surface:#101b30;
  --surface2:#14213a;
  --surface3:#192844;
  --border:#263858;
  --border2:#34496d;
  --text:#eef3ff;
  --muted:#91a0bb;
  --muted2:#6e7d98;
  --up:#ff4d67;
  --down:#2b95ff;
  --gold:#f7c84a;
  --accent:#f7c84a;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:11px;-webkit-font-smoothing:antialiased;}

.hdr{position:sticky;top:0;z-index:100;background:rgba(7,17,31,0.92);backdrop-filter:blur(12px);border-bottom:1px solid var(--border);padding:9px 12px;display:flex;align-items:center;justify-content:space-between;}
.hdr-title{font-size:17px;font-weight:950;color:var(--accent);letter-spacing:-0.5px;}
.hdr-sub{font-size:10px;color:var(--muted);margin-top:1px;font-weight:700;}
.hdr-right{display:flex;gap:6px;}
.btn{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:6px 12px;border-radius:8px;font-size:11px;font-weight:800;cursor:pointer;}
.btn:active{opacity:0.72;transform:scale(0.98);}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(247,200,74,0.12);border-color:rgba(247,200,74,0.35);color:var(--accent);}

.date-row{padding:7px 12px;display:flex;align-items:center;gap:8px;border-bottom:1px solid var(--border);background:var(--bg2);}
.date-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:5px 10px;border-radius:7px;font-size:11px;font-weight:800;}

.dashboard{padding:10px;display:flex;flex-direction:column;gap:12px;border-bottom:2px solid var(--border);background:linear-gradient(180deg,#081426 0%,#07111f 100%);}
.top-section,.kr-section{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 8px 24px rgba(0,0,0,0.28);}
.top-title,.kr-title{padding:13px 16px;font-size:22px;font-weight:950;color:var(--accent);border-bottom:1px solid var(--border);display:flex;justify-content:space-between;align-items:center;letter-spacing:-0.6px;}
.top-title span:last-child{color:var(--muted2);font-size:12px;font-weight:850;}

/* 자금흐름 + 국장타점 V9: 큰 박스 1:1 분할 + 우측 미장/국장 재분할 */
.top5-grid{display:flex;flex-direction:column;gap:0;padding:10px;background:var(--surface);}
.top5-item{position:relative;display:grid;grid-template-columns:1fr 1fr;gap:0;align-items:stretch;padding:0;background:var(--surface2);border:1px solid var(--border2);border-bottom-width:0;cursor:pointer;overflow:hidden;min-height:58px;}
.top5-item:first-child{border-radius:13px 13px 0 0;}
.top5-item:last-child{border-bottom-width:1px;border-radius:0 0 13px 13px;}
.top5-item:only-child{border-radius:13px;border-bottom-width:1px;}
.top5-item:active{background:var(--surface3);}
.top5-flow{min-width:0;padding:8px 10px;background:rgba(8,19,38,0.58);border-right:2px solid rgba(120,150,205,0.22);display:flex;flex-direction:column;justify-content:center;}
.top5-signal{min-width:0;background:rgba(247,200,74,0.035);display:grid;grid-template-columns:1fr 1fr;align-items:stretch;overflow:hidden;}
.top5-head{display:flex;align-items:center;justify-content:space-between;gap:10px;}
.top5-left{display:flex;align-items:center;gap:8px;min-width:0;}
.top5-medal{font-size:15px;line-height:1;min-width:26px;text-align:center;font-weight:950;color:#d6e0f4;}
.top5-name{font-size:15px;font-weight:950;color:var(--text);letter-spacing:-0.45px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.top5-val{font-size:21px;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-0.9px;line-height:1;color:#f2f6ff;}
.top5-trigger{min-width:0;padding:10px 10px;display:flex;align-items:center;font-size:clamp(10px,2vw,15px);font-weight:950;color:var(--up);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;border-right:1px solid rgba(247,200,74,0.18);}
.top5-target{min-width:0;padding:10px 10px;display:flex;align-items:center;background:rgba(247,200,74,0.055);font-size:clamp(9px,2vw,14px);font-weight:950;color:var(--gold);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;line-height:1.2;}
.top5-bar-wrap{height:5px;background:#07101f;border-radius:999px;margin-top:6px;overflow:hidden;border:1px solid rgba(255,255,255,0.04);}
.top5-bar{height:100%;border-radius:999px;background:linear-gradient(90deg,#2b95ff,#7c5cff);}
.top5-item:nth-child(1){background:linear-gradient(135deg,#16213a 0%,#151d32 100%);border-color:rgba(247,200,74,0.50);box-shadow:0 0 15px rgba(247,200,74,0.06);}
.top5-item:nth-child(1) .top5-flow{border-right-color:rgba(247,200,74,0.30);}
.top5-item:nth-child(1) .top5-val{color:var(--gold);font-size:26px;}
.top5-item:nth-child(1) .top5-name{font-size:17px;}
.top5-item:nth-child(1) .top5-trigger{font-size:16px;}
.top5-item:nth-child(1) .top5-target{font-size:15px;}
.top5-item:nth-child(n+4){min-height:52px;}
.top5-item:nth-child(n+4) .top5-name{font-size:14px;color:#d5ddf0;}
.top5-item:nth-child(n+4) .top5-val{font-size:19px;}
.top5-item:nth-child(n+4) .top5-trigger{font-size:14px;padding:8px 10px;}
.top5-item:nth-child(n+4) .top5-target{font-size:13px;padding:8px 10px;}
.top5-item:nth-child(n+4) .top5-bar-wrap{height:4px;margin-top:5px;}
@media(max-width:760px){.top5-grid{gap:7px}.top5-item{grid-template-columns:1fr;border-bottom-width:1px;border-radius:13px;min-height:auto}.top5-flow{border-right:0;border-bottom:1px solid rgba(120,150,205,0.22);padding:8px}.top5-signal{grid-template-columns:1fr 1fr}.top5-trigger,.top5-target{padding:8px;font-size:clamp(9px,2.5vw,13px)}.top5-target{font-size:clamp(8px,2.2vw,12.5px)}.top-title,.kr-title{font-size:18px}}

/* 오늘의 대장: 공백 줄인 히어로 + TOP10 */
.leaders-grid{display:grid;grid-template-columns:0.82fr 1.25fr;gap:8px;padding:9px;background:var(--surface);}
.leader-hero{background:linear-gradient(135deg,#211d2a 0%,#121f35 100%);border:2px solid rgba(247,200,74,0.65);border-radius:13px;padding:10px 12px;display:flex;flex-direction:column;justify-content:center;min-height:92px;box-shadow:0 0 14px rgba(247,200,74,0.08);}
.leader-hero-label{font-size:10px;color:var(--muted);font-weight:900;margin-bottom:4px;}
.leader-hero-sym{font-size:25px;font-weight:950;color:#fff;line-height:1;letter-spacing:-0.8px;}
.leader-hero-chg{font-size:32px;font-weight:950;color:var(--gold);font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-1.8px;margin-top:4px;line-height:1;}
.leader-hero-kr{font-size:10px;color:var(--gold);font-weight:850;margin-top:6px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;background:rgba(247,200,74,0.08);padding:4px 6px;border-radius:6px;border:1px solid rgba(247,200,74,0.16);}
.leader-list{display:grid;grid-template-columns:repeat(3,1fr);gap:6px;}
.leader-item{padding:7px 8px;background:var(--surface2);border:1px solid var(--border2);border-radius:10px;display:flex;align-items:center;justify-content:space-between;gap:6px;min-height:34px;}
.leader-rank{font-size:10px;color:var(--muted);font-weight:900;min-width:14px;}
.leader-sym{font-size:13px;font-weight:950;color:#fff;min-width:38px;}
.leader-chg{font-size:14px;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-0.5px;}
.leader-kr{display:none;}
@media(max-width:600px){.leaders-grid{grid-template-columns:1fr;}.leader-list{grid-template-columns:repeat(2,1fr);}.leader-item{min-height:38px}.leader-chg{font-size:15px;}}

.filter-row{padding:9px 10px;display:flex;gap:7px;overflow-x:auto;scrollbar-width:none;border-bottom:1px solid var(--border);background:#07111f;}
.filter-row::-webkit-scrollbar{display:none;}
.ftab{flex-shrink:0;padding:6px 12px;border-radius:8px;font-size:11px;font-weight:900;background:var(--surface);border:1px solid var(--border);color:#9aa7c4;cursor:pointer;white-space:nowrap;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#000;box-shadow:0 0 12px rgba(247,200,74,0.16);}

.main{padding:10px 10px 64px;display:flex;flex-direction:column;gap:14px;}
.sc{background:var(--surface);border:1px solid var(--border);border-radius:16px;overflow:hidden;box-shadow:0 6px 16px rgba(0,0,0,0.20);}
.sc-hdr{padding:10px 12px;display:flex;align-items:center;justify-content:space-between;background:var(--surface2);border-bottom:2px solid var(--border);}
.sc-name{font-size:15px;font-weight:950;color:#fff;letter-spacing:-0.35px;}
.sc-avg{font-size:22px;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-1px;}
.tk-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;padding:8px;background:#07111f;}
@media(max-width:600px){.tk-grid{grid-template-columns:repeat(2,1fr);gap:8px;}}
@media(min-width:1400px){.tk-grid{grid-template-columns:repeat(8,1fr);}}
.tk{padding:10px;background:#101a2d;border-radius:12px;display:flex;flex-direction:column;gap:5px;border:1px solid #263858;min-height:92px;}
.tk.c1{background:rgba(255,77,103,0.045);border-color:rgba(255,77,103,0.15);}
.tk.c2{background:rgba(255,77,103,0.11);border-color:rgba(255,77,103,0.32);}
.tk.c3{background:rgba(255,77,103,0.21);border-color:var(--up);box-shadow:0 0 12px rgba(255,77,103,0.12);}
.tk.c4{background:linear-gradient(135deg,rgba(255,77,103,0.28) 0%,rgba(247,200,74,0.18) 100%);border-color:var(--gold);box-shadow:0 0 16px rgba(247,200,74,0.18);}
.tk.d1{background:rgba(43,149,255,0.05);border-color:rgba(43,149,255,0.15);}
.tk.d2{background:rgba(43,149,255,0.12);border-color:rgba(43,149,255,0.32);}
.tk.d3{background:rgba(43,149,255,0.22);border-color:var(--down);box-shadow:0 0 12px rgba(43,149,255,0.12);}
.tk-top{display:flex;justify-content:space-between;align-items:flex-start;gap:4px;}
.tk-sym{font-size:16px;font-weight:950;color:#fff;letter-spacing:-0.3px;}
.tk-chg{font-size:19px;font-weight:950;font-family:ui-monospace,SFMono-Regular,Menlo,monospace;letter-spacing:-1px;line-height:1;}
.tk-desc{font-size:clamp(7px,1.8vw,10px);color:#8fa0bd;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.tk-kr{font-size:clamp(7px,1.8vw,11px);color:var(--gold);font-weight:900;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;padding:3px 5px;background:rgba(247,200,74,0.075);border-radius:6px;border:1px solid rgba(247,200,74,0.16);margin-top:1px;}
.tk-kr::before{content:'🎯 ';}
.tk-vol{font-size:9.5px;color:var(--muted2);margin-top:auto;display:flex;justify-content:space-between;}
.up{color:var(--up);} .dn{color:var(--down);} .fl{color:#70809b;}
.overlay{position:fixed;inset:0;background:rgba(7,17,31,0.96);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.overlay.hidden{display:none;}
.spin{width:42px;height:42px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.6s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;font-weight:800;color:var(--accent);}
.footer{text-align:center;font-size:10px;color:var(--muted);padding:10px;border-top:1px solid var(--border);background:var(--surface);}
</style>
</head>
<body>

<div class="overlay" id="ov">
  <div class="spin"></div>
  <div class="spin-txt" id="ovTxt">데이터 수집 중...</div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📡 미장 레이더 터미널</div>
    <div class="hdr-sub" id="hdrSub">32섹터 · 국장 매핑 분석 엔진</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn" id="refBtn" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>

<div class="date-row">
  <span style="color:var(--muted);font-size:10px;font-weight:700;">기준일:</span>
  <input type="date" class="date-input" id="dateInput">
  <button class="btn" onclick="loadData()" style="padding:3px 10px;">조회</button>
</div>

<div class="dashboard">
  <div class="top-section">
    <div class="top-title"><span>⚡ 자금흐름 + 🎯 국장타점</span><span style="color:var(--muted);font-weight:400;">Top 8</span></div>
    <div class="top5-grid" id="top5Grid"></div>
  </div>
  <div class="top-section">
    <div class="top-title"><span>🔥 오늘의 대장주 TOP10</span><span style="color:var(--muted);font-weight:400;">미장 개별 대장</span></div>
    <div class="leaders-grid" id="leadersGrid"></div>
  </div>
</div>

<div class="filter-row">
  <div class="ftab active" onclick="setFilter('all',this)">전체</div>
  <div class="ftab" onclick="setFilter('kr',this)">국장영향</div>
  <div class="ftab" onclick="setFilter('semi',this)">반도체 소부장</div>
  <div class="ftab" onclick="setFilter('ai',this)">AI / 클라우드</div>
  <div class="ftab" onclick="setFilter('energy',this)">전력 / 원전</div>
  <div class="ftab" onclick="setFilter('defense',this)">방산 / 우주항공</div>
  <div class="ftab" onclick="setFilter('bio',this)">바이오 헬스케어</div>
  <div class="ftab" onclick="setFilter('up',this)">상승↑</div>
  <div class="ftab" onclick="setFilter('dn',this)">하락↓</div>
</div>

<div class="main" id="main"></div>
<div class="footer" id="footer"></div>

<script>
const SECTORS=[
  {n:"A. ETF Overview",grp:['all','kr'],t:[["SPY","S&P500 ETF","미장흐름만"],["QQQ","나스닥100 ETF","미장흐름만"],["SOXX","반도체 ETF","삼성전자/SK하이닉스"],["XLF","금융 ETF","KB금융/신한지주"],["XLE","에너지 ETF","S-Oil/SK이노베이션"],["XLU","유틸리티 ETF","한국전력/효성중공업"],["XLV","헬스케어 ETF","삼성바이오/셀트리온"],["XLI","산업재 ETF","두산밥캣/HD현대"],["ITA","방산 ETF","한화에어로/LIG넥스원"],["XBI","바이오테크 ETF","HLB/에이비엘바이오"],["XLC","통신 ETF","NAVER/카카오"],["HACK","사이버보안 ETF","안랩/샌즈랩"],["LIT","리튬배터리 ETF","에코프로/LG에너지솔루션"],["DRIV","자율주행 ETF","현대차/기아"],["IHI","의료기기 ETF","큐렉소/덴티움"],["TLT","장기국채 ETF","미장흐름만"]]},
  {n:"B. 반도체설계",grp:['all','kr','semi'],t:[["NVDA","AI GPU 대장","삼성전자/SK하이닉스/이수페타시스"],["AMD","CPU/GPU","삼성전자/SK하이닉스/가온칩스"],["AVGO","네트워킹칩","이수페타시스/가온칩스"],["MRVL","데이터센터칩","이수페타시스/에이직랜드"],["QCOM","모바일AP","제주반도체/텔레칩스"],["ARM","칩설계 라이선스","가온칩스/에이직랜드/오픈엣지"],["CDNS","반도체설계툴","가온칩스/오픈엣지/퀄리타스"],["SNPS","반도체설계툴","가온칩스/오픈엣지/에이디테크"]]},
  {n:"B. 반도체장비",grp:['all','kr','semi'],t:[["AMAT","식각/증착 대장","한미반도체/원익IPS/피에스케이"],["LRCX","식각장비 대장","한미반도체/원익IPS/주성엔지니어링"],["ASML","노광장비 독점","원익IPS/넥스틴/오로스테크놀로지"],["KLAC","계측/검사장비","넥스틴/오로스테크놀로지/티에스이"],["ONTO","광학계측장비","넥스틴/오로스테크놀로지"],["FORM","열처리장비","주성엔지니어링/피에스케이"],["TER","반도체테스트장비 대장","ISC/티에스이/하나마이크론"],["KEYS","테스트계측장비","ISC/티에스이/와이씨"]]},

  {n:"J. 게임",grp:['all'],t:[["TTWO","GTA/2K","크래프톤/펄어비스"],["EA","스포츠게임","넷마블/엔씨소프트"],["RBLX","메타버스/UGC","크래프톤/네오위즈"],["U","게임엔진","크래프톤/펄어비스"],["DAVA","게임개발","크래프톤/펄어비스"],["PLTK","모바일게임","넷마블"],["APP","모바일광고 플랫폼","미장흐름만"],["GLBE","글로벌이커머스","미장흐름만"]]},

  {n:"K. 양자컴퓨터",grp:['all','kr'],t:[["IONQ","양자컴퓨터 대장","한국첨단소재/엑스게이트/케이씨에스"],["RGTI","양자컴퓨터","한국첨단소재/엑스게이트"],["QBTS","양자컴퓨터","한국첨단소재/케이씨에스"],["QUBT","양자컴퓨터","한국첨단소재/케이씨에스"],["QNT","양자컴퓨터(퀀티뉴엄)","한국첨단소재/엑스게이트/케이씨에스"],["BBAI","AI/국방","한싹/솔트룩스"],["ARQQ","양자암호","엑스게이트/드림시큐리티"],["QTUM","양자ETF","한국첨단소재/엑스게이트/케이씨에스"]]},
  {n:"L. 원자재/구리/금",grp:['all','kr'],t:[["FCX","구리채굴 대장","풍산/고려아연/LS"],["NEM","금채굴 대장","고려아연"],["GOLD","금채굴","고려아연"],["AA","알루미늄","조일알미늄/POSCO홀딩스"],["RIO","글로벌광산","POSCO홀딩스/고려아연"],["SCCO","구리채굴","풍산/이구산업/대창"],["NUE","철강 대장","POSCO홀딩스/현대제철"],["CLF","철강/광산","POSCO홀딩스/현대제철"]]},
];

let allData={}, curFilter='all';

function fmtC(c){if(c==null)return'N/A';const s=c>=0?'+':'';return s+c.toFixed(1)+'%';}
function fmtV(v){if(!v)return'';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return v;}
function cls(c){if(c==null)return'fl';return c>0.1?'up':c<-0.1?'dn':'fl';}
function intensityCls(c){
  if(c==null)return'';
  if(c>=10)return'c4'; if(c>=5)return'c3'; if(c>=2)return'c2'; if(c>=0.5)return'c1';
  if(c<=-5)return'd3'; if(c<=-2)return'd2'; if(c<=-0.5)return'd1';
  return'';
}
function sectorAvg(tickers){
  const vals=tickers.map(([s])=>allData[s]?.change).filter(v=>v!=null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}
function sectorDiffusion(tickers){
  const vals=tickers.map(([s])=>allData[s]?.change).filter(v=>v!=null);
  if(!vals.length)return null;
  const up=vals.filter(v=>v>0).length;
  return {up, total:vals.length};
}

function renderDashboard(){
  const medals=['🥇','🥈','🥉','4위','5위','6위','7위','8위'];
  const avgs=SECTORS.map(s=>({n:s.n.replace(/^[A-Z]\. /,''),avg:sectorAvg(s.t),full:s.n}))
    .filter(x=>x.avg!=null).sort((a,b)=>b.avg-a.avg);
  const maxAvg=Math.max(...avgs.map(x=>Math.abs(x.avg)),1);

  function sectorTargets(fullName){
    const sec=SECTORS.find(s=>s.n===fullName);
    if(!sec)return {trigger:'',stocks:''};
    const topTk=sec.t.map(([sym,desc,kr])=>({sym,change:allData[sym]?.change,kr}))
      .filter(t=>t.change!=null).sort((a,b)=>b.change-a.change).slice(0,3);
    const krSet=new Set();
    topTk.forEach(t=>t.kr.split('/').forEach(k=>k!=='미장흐름만'&&krSet.add(k)));
    return {
      trigger: topTk.map(t=>`${t.sym} ${fmtC(t.change)}`).join(' · '),
      stocks: [...krSet].slice(0,4).join(' · ') || '미장흐름만'
    };
  }

  document.getElementById('top5Grid').innerHTML=avgs.slice(0,8).map((x,i)=>{
    const cc=x.avg>0?'up':'dn';
    const sign=x.avg>=0?'+':'';
    const w=Math.max(8,Math.min(100,Math.abs(x.avg)/maxAvg*100));
    const tg=sectorTargets(x.full);
    return `<div class="top5-item" onclick="scrollToSector('${x.full}')">
      <div class="top5-flow">
        <div class="top5-head">
          <div class="top5-left">
            <span class="top5-medal">${medals[i]}</span>
            <span class="top5-name">${x.n}</span>
          </div>
          <div style="display:flex;align-items:center;gap:6px;">
            <span class="top5-val ${cc}">${sign}${x.avg.toFixed(1)}%</span>
            <span style="font-size:11px;font-weight:700;color:#6e7d98;">${(()=>{const d=sectorDiffusion(SECTORS.find(s=>s.n===x.full).t);return d?d.up+'/'+d.total:'';})()}</span>
          </div>
        </div>
        <div class="top5-bar-wrap"><div class="top5-bar" style="width:${w}%"></div></div>
      </div>
      <div class="top5-signal">
        <div class="top5-trigger">${tg.trigger}</div>
        <div class="top5-target">${tg.stocks}</div>
      </div>
    </div>`;
  }).join('');

  const allTickers=[];
  SECTORS.forEach(s=>s.t.forEach(([sym,desc,kr])=>{
    const d=allData[sym];
    if(d?.change!=null)allTickers.push({sym,kr,change:d.change,sec:s.n.replace(/^[A-Z]\. /,'')});
  }));
  const leaders=allTickers.sort((a,b)=>b.change-a.change).slice(0,10);
  const hero=leaders[0];
  const rest=leaders.slice(1,10);
  document.getElementById('leadersGrid').innerHTML=hero?`
    <div class="leader-hero">
      <div class="leader-hero-label">오늘의 1등</div>
      <div class="leader-hero-sym">${hero.sym} <span style="font-size:15px;font-weight:700;color:#8fa0bd;">${hero.sec}</span></div>
      <div class="leader-hero-chg">${fmtC(hero.change)}</div>
      <div class="leader-hero-kr">${hero.kr}</div>
    </div>
    <div class="leader-list">
      ${rest.map((x,i)=>`<div class="leader-item ${intensityCls(x.change)}">
        <span class="leader-rank">${i+2}</span>
        <span class="leader-sym">${x.sym} <span style="font-weight:700;color:#8fa0bd;">${x.sec}</span></span>
        <span class="leader-chg ${cls(x.change)}">${fmtC(x.change)}</span>
      </div>`).join('')}
    </div>`:'';
}

function scrollToSector(name){
  const el=document.getElementById('sc-'+name.replace(/[^a-zA-Z0-9]/g,'_'));
  if(el)el.scrollIntoView({behavior:'smooth',block:'start'});
}

function renderMain(){
  document.getElementById('main').innerHTML=SECTORS.map(s=>{
    const avg=sectorAvg(s.t);
    if(curFilter==='up'&&(avg==null||avg<=0))return'';
    if(curFilter==='dn'&&(avg==null||avg>=0))return'';
    if(!['all','up','dn'].includes(curFilter)&&!s.grp.includes(curFilter))return'';
    const avgC=cls(avg);
    const sign=avg!=null&&avg>=0?'+':'';
    const id='sc-'+s.n.replace(/[^a-zA-Z0-9]/g,'_');
    const rows=s.t.map(([sym,desc,kr])=>{
      const d=allData[sym];
      const c=d?.change, p=d?.price, v=d?.volume;
      const pStr=p!=null?'$'+p.toFixed(p>100?0:2):'';
      return `<div class="tk ${intensityCls(c)}">
        <div class="tk-top"><span class="tk-sym">${sym}</span><span class="tk-chg ${cls(c)}">${fmtC(c)}</span></div>
        <span class="tk-desc">${desc}</span>
        <span class="tk-kr">${kr}</span>
        <div class="tk-vol"><span>${pStr}</span><span>${fmtV(v)}</span></div>
      </div>`;
    }).join('');
    return `<div class="sc" id="${id}">
      <div class="sc-hdr"><span class="sc-name">${s.n}</span><span class="sc-avg ${avgC}">${avg!=null?sign+avg.toFixed(1)+'%':'N/A'}</span></div>
      <div class="tk-grid">${rows}</div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderMain();
}

// ── 배치 API 호출 (핵심: 20개씩 묶어서 호출) ──
async function fetchAll(syms){
  const res={};
  const batchSize=20;
  for(let i=0;i<syms.length;i+=batchSize){
    const b=syms.slice(i,i+batchSize);
    document.getElementById('ovTxt').textContent=`수집 중... ${i}/${syms.length}`;
    try{
      const r=await fetch(`/api/quote?symbols=${b.join(',')}`);
      if(r.ok){
        const d=await r.json();
        b.forEach(s=>{
          if(d[s]&&d[s].price!=null)res[s]={price:d[s].price,change:d[s].change,volume:d[s].volume};
          else res[s]=null;
        });
      } else { b.forEach(s=>res[s]=null); }
    }catch{ b.forEach(s=>res[s]=null); }
    if(i+batchSize<syms.length)await new Promise(r=>setTimeout(r,200));
  }
  return res;
}

async function loadData(){
  const ov=document.getElementById('ov');
  const btn=document.getElementById('refBtn');
  ov.classList.remove('hidden');
  btn.classList.add('loading');
  try{
    const syms=[...new Set(SECTORS.flatMap(s=>s.t.map(t=>t[0])))];
    allData=await fetchAll(syms);
    const ok=Object.values(allData).filter(v=>v).length;
    document.getElementById('hdrSub').textContent=`32섹터 · ${ok}개 수집완료`;
    document.getElementById('footer').textContent=`업데이트: ${new Date().toLocaleString('ko-KR')} | ${ok}/${syms.length}개`;
    renderDashboard();
    renderMain();
  }catch(e){alert('오류: '+e.message);}
  finally{
    setTimeout(()=>ov.classList.add('hidden'),300);
    btn.classList.remove('loading');
  }
}

function downloadCSV(){
  const rows=[['날짜','섹터','티커','설명','국장매핑','등락률%','거래량','가격']];
  const today=new Date().toLocaleDateString('ko-KR');
  SECTORS.forEach(s=>s.t.forEach(([sym,desc,kr])=>{
    const d=allData[sym];
    rows.push([today,s.n,sym,desc,kr,d?.change!=null?d.change.toFixed(2):'',d?.volume||'',d?.price!=null?d.price.toFixed(2):'']);
  }));
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`us_radar_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

function initDate(){
  const inp=document.getElementById('dateInput');
  const d=new Date();
  const day=d.getDay();
  d.setDate(d.getDate()-(day===0?2:day===6?1:1));
  inp.value=d.toISOString().split('T')[0];
}

initDate();
loadData();
</script>
