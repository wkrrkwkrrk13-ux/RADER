<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07111f">
<title>GICS 종가 자금흐름 레이더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pageMax:1120px;
  --bg:#07111f;
  --bg2:#0a1424;
  --surface:#101b30;
  --surface2:#14213a;
  --surface3:#192844;
  --border:#263858;
  --border2:#34496d;
  --text:#eef3ff;
  --muted:#91a0bb;
  --muted2:#6e7d98;
  --up:#ff4d67;
  --down:#2b95ff;
  --gold:#f7c84a;
  --accent:#f7c84a;
  --green:#7fd97f;
  --warn:#ffb020;
}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(circle at top center, rgba(25,40,68,0.52) 0%, rgba(7,17,31,0.94) 360px, #030915 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}
.hdr,.meta,.tab-row,.controls,.notice,.main,.footer{
  width:min(100%, var(--pageMax));
  margin-left:auto;
  margin-right:auto;
}
.hdr,.meta,.tab-row,.controls,.footer{
  border-left:1px solid rgba(38,56,88,0.65);
  border-right:1px solid rgba(38,56,88,0.65);
}
.hdr{
  position:sticky;top:0;z-index:100;
  background:rgba(7,17,31,0.94);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  border-radius:0 0 12px 12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
  padding:10px 12px;
  display:flex;align-items:center;justify-content:space-between;gap:10px;
}
.hdr-title{font-size:19px;font-weight:950;color:var(--accent);letter-spacing:-0.6px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:800;}
.creator-line{margin-top:3px;font-size:10px;font-weight:950;color:rgba(247,200,74,0.82);letter-spacing:0.35px;text-transform:uppercase;}
.hdr-right{display:flex;gap:6px;flex-shrink:0;flex-wrap:wrap;justify-content:flex-end;}
.btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:7px 11px;
  border-radius:8px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.btn:active{opacity:0.72;transform:scale(0.98);}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(247,200,74,0.12);border-color:rgba(247,200,74,0.35);color:var(--accent);}
.meta{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:6px;
  padding:8px 10px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.meta-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 8px;
  min-width:0;
}
.meta-label{font-size:10px;font-weight:900;color:var(--muted2);letter-spacing:0.3px;}
.meta-value{
  margin-top:3px;
  font-size:13px;
  font-weight:950;
  color:var(--text);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.meta-value.accent{color:var(--accent);}
.meta-value.green{color:var(--green);}
.meta-value.warn{color:var(--warn);}
.tab-row{
  display:flex;gap:6px;
  padding:8px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:50px;
  z-index:90;
  overflow:auto;
}
.tab{
  padding:7px 14px;
  border-radius:8px;
  font-size:13px;
  font-weight:950;
  background:var(--surface2);
  border:1px solid var(--border);
  color:#9aa7c4;
  cursor:pointer;
  user-select:none;
  white-space:nowrap;
}
.tab.active{background:rgba(247,200,74,0.16);border-color:rgba(247,200,74,0.45);color:var(--accent);}
.controls{
  display:flex;align-items:center;gap:8px;flex-wrap:wrap;
  padding:8px 10px;
  background:#081525;
  border-bottom:1px solid var(--border);
}
.control-label{font-size:11px;font-weight:900;color:var(--muted2);}
select,input{
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:6px 8px;
  font-size:12px;
  font-weight:800;
  min-width:120px;
}
input{min-width:220px;}
.notice{
  margin-top:10px;
  padding:8px 10px;
  border:1px solid rgba(255,176,32,0.35);
  background:rgba(255,176,32,0.08);
  color:#ffd27a;
  border-radius:8px;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.notice.hidden{display:none;}
.main{padding:10px 0 18px;}
.table-wrap{
  background:#0c1627;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:auto;
  box-shadow:0 12px 28px rgba(0,0,0,0.22), 0 0 0 1px #0a1728;
}
table{width:100%;border-collapse:collapse;min-width:980px;}
th{
  position:sticky;top:0;z-index:10;
  background:#162541;
  color:#dfe8ff;
  font-size:11px;
  font-weight:950;
  text-align:right;
  border-bottom:1px solid var(--border2);
  padding:7px 7px;
  white-space:nowrap;
}
th:first-child,th:nth-child(2),th:nth-child(3){text-align:left;}
td{
  padding:6px 7px;
  border-bottom:1px solid #12213a;
  font-size:13px;
  font-weight:800;
  text-align:right;
  white-space:nowrap;
}
td:first-child,td:nth-child(2),td:nth-child(3){text-align:left;}
tr:hover td{background:rgba(255,255,255,0.025);}
.rank{font-size:12px;font-weight:950;color:var(--accent);}
.code{font-size:11px;color:var(--muted2);font-weight:900;}
.name{font-weight:950;}
.sub{display:block;font-size:10px;color:var(--muted2);margin-top:2px;font-weight:800;}
.mono{font-variant-numeric:tabular-nums;font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
.good{color:var(--up);}
.bad{color:var(--down);}
.flat{color:var(--muted);}
.score-cell{color:var(--gold);font-weight:950;}
.badge{
  display:inline-block;
  padding:2px 6px;
  border-radius:999px;
  border:1px solid var(--border2);
  font-size:10px;
  font-weight:950;
  color:#b8c5df;
  background:rgba(255,255,255,0.04);
}
.badge.us{color:#9ed0ff;border-color:rgba(43,149,255,0.35);background:rgba(43,149,255,0.08);}
.badge.kr{color:#ffb6c1;border-color:rgba(255,77,103,0.35);background:rgba(255,77,103,0.08);}
.badge.ok{color:#9af09a;border-color:rgba(127,217,127,0.35);background:rgba(127,217,127,0.08);}
.badge.warn{color:#ffd27a;border-color:rgba(255,176,32,0.35);background:rgba(255,176,32,0.08);}
.footer{
  padding:12px 10px 26px;
  color:var(--muted2);
  font-size:11px;
  font-weight:800;
  line-height:1.5;
}
.empty{
  padding:36px 14px;
  text-align:center;
  color:var(--muted);
  font-weight:900;
}
.card-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
  margin-bottom:10px;
}
.info-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:12px;
  padding:10px;
}
.info-title{font-size:12px;color:var(--muted);font-weight:950;}
.info-value{margin-top:5px;font-size:18px;font-weight:950;color:var(--accent);}
.info-desc{margin-top:4px;font-size:11px;color:var(--muted2);font-weight:800;}
@media(max-width:720px){
  :root{--pageMax:100%;}
  body{font-size:12px;}
  .hdr{align-items:flex-start;position:relative;}
  .hdr-title{font-size:17px;}
  .hdr-right{width:100%;}
  .meta{grid-template-columns:repeat(2,1fr);}
  .tab-row{top:0;position:relative;}
  .card-grid{grid-template-columns:1fr;}
  table{min-width:930px;}
  input{min-width:160px;}
}
</style>
</head>
<body>
<header class="hdr">
  <div>
    <div class="hdr-title">GICS 종가 자금흐름 레이더</div>
    <div class="hdr-sub">전일 미장 종가 × 다음날 국장 종가 · 11/25/74분류 비교</div>
    <div class="creator-line">Built by HJS</div>
  </div>
  <div class="hdr-right">
    <button class="btn" id="reloadBtn" onclick="loadAll(true)">새로고침</button>
    <button class="btn btn-csv" onclick="downloadCSV()">CSV 저장</button>
  </div>
</header>

<section class="meta" id="meta"></section>

<nav class="tab-row">
  <button class="tab active" data-tab="follow" onclick="setTab('follow')">미장→국장 추종</button>
  <button class="tab" data-tab="us" onclick="setTab('us')">미장 종가</button>
  <button class="tab" data-tab="kr" onclick="setTab('kr')">국장 종가</button>
  <button class="tab" data-tab="stocks" onclick="setTab('stocks')">종목 검색</button>
</nav>

<section class="controls">
  <span class="control-label">분류 단계</span>
  <select id="levelSel" onchange="state.level=this.value; render()">
    <option value="11">11분류</option>
    <option value="25">25분류</option>
    <option value="74" selected>74분류</option>
  </select>

  <span class="control-label">정렬</span>
  <select id="sortSel" onchange="state.sort=this.value; render()">
    <option value="follow">추종점수</option>
    <option value="score">종합점수</option>
    <option value="dollar_share">거래대금비중</option>
    <option value="rvol">RVOL</option>
    <option value="weighted">가중등락</option>
    <option value="us_rank">미장순위</option>
    <option value="kr_rank">국장순위</option>
  </select>

  <span class="control-label">검색</span>
  <input id="searchInput" placeholder="섹터명 / 종목명 / 코드 검색" oninput="state.search=this.value.trim(); render()">
</section>

<div class="notice hidden" id="notice"></div>
<main class="main" id="main"></main>
<footer class="footer">
  실시간 탭은 제거했습니다. 이 레이더는 정규장 종가 스냅샷만 사용합니다. 미장과 국장은 절대 거래대금이 아니라 각 시장 내부 점수·순위·비중으로 비교합니다.
</footer>

<script>
const REPO_RAW = 'https://raw.githubusercontent.com/wkrrkwkrrk13-ux/RADER/main/';
const URLS = {
  master: [REPO_RAW + 'GICS_통합마스터_관종번호순.json', './GICS_통합마스터_관종번호순.json'],
  us: [REPO_RAW + 'cache/prices.json', './cache/prices.json'],
  kr: [REPO_RAW + 'cache/kr_prices.json', './cache/kr_prices.json']
};

const state = {
  tab:'follow',
  level:'74',
  sort:'follow',
  search:''
};

let master = null;
let records = [];
let usCache = null;
let krCache = null;
let lastRows = [];

const LEVELS = {
  '11': {code:'sector_code', name:'sector', label:'11분류'},
  '25': {code:'industry_group_code', name:'industry_group', label:'25분류'},
  '74': {code:'industry_code', name:'industry', label:'74분류'}
};

function cls(v){
  if(v > 0) return 'good';
  if(v < 0) return 'bad';
  return 'flat';
}
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function fmtPct(v){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  const sign = v > 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}
function fmtNum(v, digits=0){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  return Number(v).toLocaleString('ko-KR', {maximumFractionDigits:digits, minimumFractionDigits:digits});
}
function fmtScore(v){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  return Number(v).toFixed(1);
}
function fmtRvol(v){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  return `${Number(v).toFixed(2)}x`;
}
function fmtMoney(v, market){
  if(v === null || v === undefined || !isFinite(v) || v <= 0) return '—';
  const abs = Math.abs(v);
  if(market === 'KR'){
    if(abs >= 1e12) return `${(v/1e12).toFixed(2)}조`;
    if(abs >= 1e8) return `${(v/1e8).toFixed(1)}억`;
    return `${fmtNum(v,0)}원`;
  }
  if(abs >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
  if(abs >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
  if(abs >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  return `$${fmtNum(v,0)}`;
}
function cacheBust(url, force=false){
  return force ? `${url}?t=${Date.now()}` : `${url}?t=${Math.floor(Date.now()/60000)}`;
}
async function fetchJSONFrom(urls, force=false, optional=false){
  let lastErr = null;
  for(const url of urls){
    try{
      const res = await fetch(cacheBust(url, force), {cache:'no-store'});
      if(!res.ok) throw new Error(`${res.status}`);
      return await res.json();
    }catch(e){
      lastErr = e;
      console.warn('fetch failed', url, e);
    }
  }
  if(optional) return null;
  throw lastErr || new Error('fetch failed');
}
function showNotice(msg){
  const el = document.getElementById('notice');
  if(!msg){el.classList.add('hidden'); el.innerHTML=''; return;}
  el.classList.remove('hidden');
  el.innerHTML = msg;
}
function normalizeRecords(rows){
  // 방어용: 혹시 마스터에 파두 중복이 남아 있으면 전자장비 섹터외 파두를 제거한다.
  const filtered = (rows || []).filter(r => !(r.market==='KR' && r.code==='440110' && r.industry_code==='452030' && r.sub_industry==='섹터외'));
  return filtered.map(r => ({
    market: r.market,
    watchlist_no: r.watchlist_no ?? '',
    sector_code: String(r.sector_code ?? ''),
    sector: r.sector ?? '',
    industry_group_code: String(r.industry_group_code ?? ''),
    industry_group: r.industry_group ?? '',
    industry_code: String(r.industry_code ?? ''),
    industry: r.industry ?? '',
    sub_industry: r.sub_industry ?? '',
    code: String(r.code ?? '').trim().toUpperCase(),
    name: r.name ?? ''
  }));
}
function priceMap(market){
  return market === 'US' ? (usCache?.us || {}) : (krCache?.kr || {});
}
function getPrice(market, code){
  const m = priceMap(market);
  let q = m[code];
  if(!q && market === 'KR') q = m[String(code).padStart(6,'0')];
  if(!q) return null;

  const price = Number(q.regular_price ?? q.price);
  const change = Number(q.regular_change ?? q.change);
  const volume = Number(q.regular_volume ?? q.volume ?? 0);
  let dollar = Number(q.regular_dollar_volume ?? q.dollar_volume ?? 0);
  const avg20 = Number(q.regular_avg20_dollar_volume ?? 0);
  const rvol = avg20 > 0 && dollar > 0 ? dollar / avg20 : Number(q.regular_dollar_rvol ?? NaN);

  if(!isFinite(price) || !isFinite(change)) return null;
  return {price, change, volume, dollar, avg20, rvol};
}
function groupRecords(market, level){
  const def = LEVELS[level];
  const q = state.search.toLowerCase();
  const map = new Map();

  for(const r of records){
    if(r.market !== market) continue;
    if(q){
      const hay = `${r.sector} ${r.industry_group} ${r.industry} ${r.sub_industry} ${r.code} ${r.name}`.toLowerCase();
      if(!hay.includes(q)) continue;
    }
    const code = r[def.code] || 'NA';
    const name = r[def.name] || '미분류';
    const key = `${code}|${name}`;
    if(!map.has(key)){
      map.set(key, {
        market,
        level,
        code,
        name,
        sector: r.sector,
        industry_group: r.industry_group,
        industry: r.industry,
        records: []
      });
    }
    map.get(key).records.push(r);
  }

  const rows = Array.from(map.values()).map(calcGroupMetrics);
  computeScores(rows);
  return rows;
}
function calcGroupMetrics(g){
  let valid = 0, up = 0, down = 0;
  let dollar = 0, avg20 = 0, posDollar = 0, negDollar = 0;
  let weightedNum = 0;
  let priceable = 0;

  for(const r of g.records){
    const p = getPrice(g.market, r.code);
    if(!p) continue;
    priceable += 1;
    valid += 1;
    if(p.change > 0) up += 1;
    if(p.change < 0) down += 1;

    const w = p.dollar > 0 ? p.dollar : 0;
    if(w > 0){
      dollar += w;
      weightedNum += p.change * w;
      if(p.change > 0) posDollar += w;
      else if(p.change < 0) negDollar += w;
    }
    if(p.avg20 > 0) avg20 += p.avg20;
  }

  const weighted = dollar > 0 ? weightedNum / dollar : null;
  const breadth = valid > 0 ? up / valid * 100 : null;
  const netDollar = posDollar - negDollar;
  const dollarBias = dollar > 0 ? netDollar / dollar * 100 : null;
  const rvol = avg20 > 0 && dollar > 0 ? dollar / avg20 : null;

  return {
    ...g,
    count:g.records.length,
    valid,
    priceable,
    up,
    down,
    dollar,
    avg20,
    rvol,
    weighted,
    breadth,
    netDollar,
    dollarBias,
    dollarShare:0,
    score:0,
    rank:null,
    rankPct:null
  };
}
function computeScores(rows){
  const totalDollar = rows.reduce((a,r)=>a+(r.dollar||0),0);
  for(const r of rows){
    r.dollarShare = totalDollar > 0 ? r.dollar / totalDollar * 100 : 0;
  }

  const logs = rows.map(r => Math.log10(Math.max(r.dollar || 0, 1)));
  const minLog = Math.min(...logs);
  const maxLog = Math.max(...logs);
  const range = maxLog - minLog;

  for(const r of rows){
    const logDollar = Math.log10(Math.max(r.dollar || 0, 1));
    const dollarScore = range > 0 ? (logDollar - minLog) / range * 100 : 0;
    const rvolScore = r.rvol ? Math.max(0, Math.min(100, r.rvol / 3 * 100)) : 0;
    const breadthScore = r.breadth === null ? 0 : Math.max(0, Math.min(100, r.breadth));
    const weightedScore = r.weighted === null ? 0 : Math.max(0, Math.min(100, ((r.weighted + 3) / 10) * 100));
    const netScore = r.dollarBias === null ? 0 : Math.max(0, Math.min(100, (r.dollarBias + 100) / 2));

    r.score =
      dollarScore * 0.30 +
      rvolScore * 0.25 +
      breadthScore * 0.20 +
      weightedScore * 0.20 +
      netScore * 0.05;
  }

  const sorted = [...rows].sort((a,b)=>(b.score-a.score)||(b.dollar-a.dollar));
  const n = sorted.length;
  sorted.forEach((r,i)=>{
    r.rank = i + 1;
    r.rankPct = n > 1 ? i / (n - 1) : 0;
  });
}
function sortRows(rows, market){
  const s = state.sort;
  const arr = [...rows];

  const sorters = {
    score:(a,b)=>(b.score-a.score)||(b.dollar-a.dollar),
    dollar_share:(a,b)=>(b.dollarShare-a.dollarShare)||(b.score-a.score),
    rvol:(a,b)=>((b.rvol||0)-(a.rvol||0))||(b.score-a.score),
    weighted:(a,b)=>((b.weighted??-999)-(a.weighted??-999))||(b.score-a.score),
    us_rank:(a,b)=>(a.us?.rank??999)-(b.us?.rank??999),
    kr_rank:(a,b)=>(a.kr?.rank??999)-(b.kr?.rank??999),
    follow:(a,b)=>(b.followScore-a.followScore)||((a.us?.rank??999)-(b.us?.rank??999))
  };

  if(market === 'follow') return arr.sort(sorters[s] || sorters.follow);
  return arr.sort(sorters[s] || sorters.score);
}
function renderMeta(){
  const usDate = usCache?.date_key || '—';
  const krDate = krCache?.date_key || '—';
  const usCount = usCache?.counts?.ok ?? Object.keys(usCache?.us || {}).length;
  const krCount = krCache?.counts?.ok ?? Object.keys(krCache?.kr || {}).length;
  const masterKR = records.filter(r=>r.market==='KR').length;
  const masterUS = records.filter(r=>r.market==='US').length;

  document.getElementById('meta').innerHTML = `
    <div class="meta-card"><div class="meta-label">미장 선행일</div><div class="meta-value accent">${esc(usDate)}</div></div>
    <div class="meta-card"><div class="meta-label">국장 반응일</div><div class="meta-value accent">${esc(krDate)}</div></div>
    <div class="meta-card"><div class="meta-label">미장 가격수집</div><div class="meta-value green">${fmtNum(usCount)} / ${fmtNum(masterUS)}</div></div>
    <div class="meta-card"><div class="meta-label">국장 가격수집</div><div class="meta-value ${krCache?'green':'warn'}">${krCache ? `${fmtNum(krCount)} / ${fmtNum(masterKR)}` : '대기'}</div></div>
    <div class="meta-card"><div class="meta-label">현재 분류</div><div class="meta-value">${LEVELS[state.level].label}</div></div>
    <div class="meta-card"><div class="meta-label">모드</div><div class="meta-value">종가 전용</div></div>
  `;
}
function renderFlow(market){
  const rows = sortRows(groupRecords(market, state.level), market);
  lastRows = rows.map(r => ({
    market, level:LEVELS[state.level].label, rank:r.rank, code:r.code, name:r.name,
    count:r.count, valid:r.valid, score:r.score, weighted:r.weighted, breadth:r.breadth,
    dollarShare:r.dollarShare, dollar:r.dollar, rvol:r.rvol, netDollar:r.netDollar
  }));

  const title = market === 'US' ? '미장 종가 자금흐름' : '국장 종가 자금흐름';
  const date = market === 'US' ? usCache?.date_key : krCache?.date_key;

  if(market === 'KR' && !krCache){
    return `<div class="empty">아직 국장 종가 캐시가 없습니다.<br>Actions에서 fetch_kr_prices.py가 한 번 돌아가면 cache/kr_prices.json이 생성됩니다.</div>`;
  }

  return `
    <div class="card-grid">
      <div class="info-card"><div class="info-title">${title}</div><div class="info-value">${esc(date || '—')}</div><div class="info-desc">정규장 종가 기준</div></div>
      <div class="info-card"><div class="info-title">분류 단계</div><div class="info-value">${LEVELS[state.level].label}</div><div class="info-desc">11 / 25 / 74 선택 가능</div></div>
      <div class="info-card"><div class="info-title">비교 방식</div><div class="info-value">시장내 점수</div><div class="info-desc">거래대금 30 + RVOL 25 + 상승비율 20 + 가중등락 20 + 순매수성 5</div></div>
    </div>

}
function flowTable(rows, market){

  return `
    <div class="table-wrap">

  `;
}
function mergeFollow(){
  const usRows = groupRecords('US', state.level);
  const krRows = krCache ? groupRecords('KR', state.level) : [];
  const usMap = new Map(usRows.map(r => [r.code, r]));
  const krMap = new Map(krRows.map(r => [r.code, r]));
  const codes = new Set([...usMap.keys(), ...krMap.keys()]);
  const rows = [];

  for(const code of codes){
    const us = usMap.get(code) || null;
    const kr = krMap.get(code) || null;
    const name = us?.name || kr?.name || code;

    let rankScore = 0, signScore = 0, responseScore = 0, followScore = 0;
    if(us && kr){
      rankScore = Math.max(0, 100 - Math.abs((us.rankPct ?? 1) - (kr.rankPct ?? 1)) * 100);
      const u = us.weighted || 0;
      const k = kr.weighted || 0;
      if(Math.abs(u) < 0.05 || Math.abs(k) < 0.05) signScore = 50;
      else signScore = Math.sign(u) === Math.sign(k) ? 100 : 0;

      if(Math.abs(u) > 0.01 && Math.sign(u) === Math.sign(k)){
        responseScore = Math.max(0, Math.min(100, Math.abs(k) / Math.abs(u) * 100));
      }

      followScore = rankScore * 0.45 + signScore * 0.35 + responseScore * 0.20;
    }

    rows.push({code, name, us, kr, rankScore, signScore, responseScore, followScore});
  }

  return sortRows(rows, 'follow');
}
function renderFollow(){
  const rows = mergeFollow();
  lastRows = rows.map(r=>({
    level:LEVELS[state.level].label,
    code:r.code,
    name:r.name,
    followScore:r.followScore,
    usRank:r.us?.rank, usScore:r.us?.score, usWeighted:r.us?.weighted, usRvol:r.us?.rvol, usBreadth:r.us?.breadth, usDollarShare:r.us?.dollarShare,
    krRank:r.kr?.rank, krScore:r.kr?.score, krWeighted:r.kr?.weighted, krRvol:r.kr?.rvol, krBreadth:r.kr?.breadth, krDollarShare:r.kr?.dollarShare
  }));

  const notice = !krCache
    ? `<div class="notice">국장 종가 캐시가 아직 없습니다. 지금은 미장 데이터만 보입니다. GitHub Actions에서 새 workflow가 성공하면 비교표가 완성됩니다.</div>`
    : '';

  return `
    <div class="card-grid">
      <div class="info-card"><div class="info-title">비교 기준</div><div class="info-value">${esc(usCache?.date_key || '—')} → ${esc(krCache?.date_key || '—')}</div><div class="info-desc">한국장 시작 전에 끝난 미장 종가와 한국장 종가 비교</div></div>
      <div class="info-card"><div class="info-title">추종점수</div><div class="info-value">순위+방향+반응</div><div class="info-desc">순위 유사성 45% · 방향 일치 35% · 등락 반응 20%</div></div>
      <div class="info-card"><div class="info-title">주의</div><div class="info-value">절대값 비교 아님</div><div class="info-desc">미장 대표종목과 국장 전종목 비대칭 → 시장내 표준화</div></div>
    </div>
    ${notice}
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>분류</th>
            <th>코드</th>
            <th>섹터명</th>
            <th>추종점수</th>
            <th>미장순위</th>
            <th>미장점수</th>
            <th>미장가중등락</th>
            <th>미장RVOL</th>
            <th>국장순위</th>
            <th>국장점수</th>
            <th>국장가중등락</th>
            <th>국장RVOL</th>
            <th>판정</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>{
            const verdict = !r.us || !r.kr ? '비교불가' :
              r.followScore >= 75 ? '강한 추종' :
              r.followScore >= 55 ? '보통 추종' :
              r.followScore >= 35 ? '약한 추종' : '불일치';
            const badgeClass = verdict==='강한 추종' ? 'ok' : verdict==='비교불가' ? 'warn' : '';
            return `
            <tr>
              <td>${LEVELS[state.level].label}</td>
              <td class="code">${esc(r.code)}</td>
              <td><span class="name">${esc(r.name)}</span></td>
              <td class="mono score-cell">${fmtScore(r.followScore)}</td>
              <td class="mono">${r.us ? '#'+r.us.rank : '—'}</td>
              <td class="mono">${r.us ? fmtScore(r.us.score) : '—'}</td>
              <td class="${cls(r.us?.weighted)} mono">${r.us ? fmtPct(r.us.weighted) : '—'}</td>
              <td class="mono">${r.us ? fmtRvol(r.us.rvol) : '—'}</td>
              <td class="mono">${r.kr ? '#'+r.kr.rank : '—'}</td>
              <td class="mono">${r.kr ? fmtScore(r.kr.score) : '—'}</td>
              <td class="${cls(r.kr?.weighted)} mono">${r.kr ? fmtPct(r.kr.weighted) : '—'}</td>
              <td class="mono">${r.kr ? fmtRvol(r.kr.rvol) : '—'}</td>
              <td><span class="badge ${badgeClass}">${verdict}</span></td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}
function renderStocks(){
  const q = state.search.toLowerCase();
  let rows = records.filter(r=>{
    if(!q) return false;
    const hay = `${r.market} ${r.code} ${r.name} ${r.sector} ${r.industry_group} ${r.industry} ${r.sub_industry}`.toLowerCase();
    return hay.includes(q);
  }).slice(0, 300);

  lastRows = rows.map(r=>{
    const p = getPrice(r.market, r.code);
    return {...r, price:p?.price, change:p?.change, dollar:p?.dollar, rvol:p?.rvol};
  });

  if(!q) return `<div class="empty">검색어를 입력하면 종목을 찾습니다.</div>`;
  if(!rows.length) return `<div class="empty">검색 결과가 없습니다.</div>`;

  return `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>시장</th>
            <th>코드</th>
            <th>종목명</th>
            <th>관종</th>
            <th>11분류</th>
            <th>25분류</th>
            <th>74분류</th>
            <th>163/커스텀</th>
            <th>종가</th>
            <th>등락률</th>
            <th>거래대금</th>
            <th>RVOL</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>{
            const p = getPrice(r.market, r.code);
            return `
            <tr>
              <td><span class="badge ${r.market==='US'?'us':'kr'}">${r.market}</span></td>
              <td class="code">${esc(r.code)}</td>
              <td><span class="name">${esc(r.name)}</span></td>
              <td class="mono">${esc(r.watchlist_no)}</td>
              <td>${esc(r.sector)}</td>
              <td>${esc(r.industry_group)}</td>
              <td>${esc(r.industry)}</td>
              <td>${esc(r.sub_industry)}</td>
              <td class="mono">${p ? fmtNum(p.price, r.market==='KR'?0:2) : '—'}</td>
              <td class="${cls(p?.change)} mono">${p ? fmtPct(p.change) : '—'}</td>
              <td class="mono">${p ? fmtMoney(p.dollar, r.market) : '—'}</td>
              <td class="mono">${p ? fmtRvol(p.rvol) : '—'}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  `;
}
function render(){
  renderMeta();
  showNotice('');
  document.getElementById('levelSel').value = state.level;
  document.getElementById('sortSel').value = state.sort;
  document.querySelectorAll('.tab').forEach(t=>t.classList.toggle('active', t.dataset.tab===state.tab));

  // 추종 탭이 아닐 때 추종 전용 정렬이면 자동 보정
  const sortSel = document.getElementById('sortSel');
  for(const opt of sortSel.options){
    if(['follow','us_rank','kr_rank'].includes(opt.value)) opt.disabled = state.tab !== 'follow';
    else opt.disabled = false;
  }
  if(state.tab !== 'follow' && ['follow','us_rank','kr_rank'].includes(state.sort)){
    state.sort = 'score';
    sortSel.value = 'score';
  }
  if(state.tab === 'follow' && !state.sort) state.sort = 'follow';

  const main = document.getElementById('main');
  if(!master){
    main.innerHTML = `<div class="empty">데이터 로딩 중...</div>`;
    return;
  }

  if(state.tab === 'us') main.innerHTML = renderFlow('US');
  else if(state.tab === 'kr') main.innerHTML = renderFlow('KR');
  else if(state.tab === 'stocks') main.innerHTML = renderStocks();
  else main.innerHTML = renderFollow();
}
function setTab(tab){
  state.tab = tab;
  if(tab === 'follow' && !['follow','score','dollar_share','rvol','weighted','us_rank','kr_rank'].includes(state.sort)) state.sort = 'follow';
  if(tab !== 'follow' && ['follow','us_rank','kr_rank'].includes(state.sort)) state.sort = 'score';
  render();
}
function toCsvCell(v){
  if(v === null || v === undefined) return '';
  const s = String(v);
  if(/[",\n]/.test(s)) return `"${s.replace(/"/g,'""')}"`;
  return s;
}
function downloadCSV(){
  if(!lastRows.length) return;
  const keys = Object.keys(lastRows[0]);
  const csv = [keys.join(',')].concat(lastRows.map(r=>keys.map(k=>toCsvCell(r[k])).join(','))).join('\n');
  const blob = new Blob(['\ufeff'+csv], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `gics_close_radar_${state.tab}_${state.level}_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function loadAll(force=false){
  const btn = document.getElementById('reloadBtn');
  btn.classList.add('loading');
  btn.textContent = '로딩중';

  try{
    const [m,u,k] = await Promise.all([
      fetchJSONFrom(URLS.master, force),
      fetchJSONFrom(URLS.us, force),
      fetchJSONFrom(URLS.kr, force, true)
    ]);

    master = m;
    records = normalizeRecords(m.records || []);
    usCache = u;
    krCache = k;

    const msg = [];
    if(!krCache) msg.push('국장 종가 캐시가 아직 없습니다. 새 workflow가 성공하면 cache/kr_prices.json이 생성됩니다.');
    if(!usCache?.us) msg.push('미장 가격 캐시 형식이 예상과 다릅니다.');
    if(msg.length) showNotice(msg.join('<br>'));

    render();
  }catch(e){
    console.error(e);
    document.getElementById('main').innerHTML = `<div class="empty">데이터 로딩 실패<br>${esc(e.message || e)}</div>`;
  }finally{
    btn.classList.remove('loading');
    btn.textContent = '새로고침';
  }
}

loadAll(false);
</script>
