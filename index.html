<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#07111f">
<title>GICS74 미장 자금흐름 레이더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --pageMax:1080px;
  --bg:#07111f;
  --bg2:#0a1424;
  --surface:#101b30;
  --surface2:#14213a;
  --surface3:#192844;
  --border:#263858;
  --border2:#34496d;
  --text:#eef3ff;
  --muted:#91a0bb;
  --muted2:#6e7d98;
  --up:#ff4d67;
  --down:#2b95ff;
  --gold:#f7c84a;
  --accent:#f7c84a;
  --green:#7fd97f;
  --warn:#ffb020;
}
html,body{overflow-x:hidden;}
body{
  background:
    radial-gradient(circle at top center, rgba(25,40,68,0.52) 0%, rgba(7,17,31,0.94) 360px, #030915 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,'Malgun Gothic','Apple SD Gothic Neo',sans-serif;
  font-size:13px;
  -webkit-font-smoothing:antialiased;
}

/* 중앙 집중형 레이아웃: 웹툰처럼 가운데 세로 피드 느낌 */
.hdr,
.meta,
.tab-row,
.controls,
.notice,
.main,
.footer{
  width:min(100%, var(--pageMax));
  margin-left:auto;
  margin-right:auto;
}

.hdr,
.meta,
.tab-row,
.controls,
.footer{
  border-left:1px solid rgba(38,56,88,0.65);
  border-right:1px solid rgba(38,56,88,0.65);
}

.hdr{
  border-radius:0 0 12px 12px;
  box-shadow:0 10px 30px rgba(0,0,0,0.18);
}
.hdr{
  position:sticky;
  top:0;
  z-index:100;
  background:rgba(7,17,31,0.94);
  backdrop-filter:blur(12px);
  border-bottom:1px solid var(--border);
  padding:10px 12px;
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
}
.hdr-title{font-size:19px;font-weight:950;color:var(--accent);letter-spacing:-0.6px;}
.hdr-sub{font-size:11px;color:var(--muted);margin-top:2px;font-weight:800;}
.hdr-right{display:flex;gap:6px;flex-shrink:0;}
.btn{
  background:var(--surface);
  border:1px solid var(--border);
  color:var(--text);
  padding:7px 11px;
  border-radius:8px;
  font-size:12px;
  font-weight:900;
  cursor:pointer;
}
.btn:active{opacity:0.72;transform:scale(0.98);}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(247,200,74,0.12);border-color:rgba(247,200,74,0.35);color:var(--accent);}
.meta{
  display:grid;
  grid-template-columns:repeat(5,1fr);
  gap:6px;
  padding:8px 10px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
}
.meta-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:8px;
  padding:7px 8px;
  min-width:0;
}
.meta-label{font-size:10px;font-weight:900;color:var(--muted2);letter-spacing:0.3px;}
.meta-value{
  margin-top:3px;
  font-size:13px;
  font-weight:950;
  color:var(--text);
  overflow:hidden;
  white-space:nowrap;
  text-overflow:ellipsis;
}
.meta-value.accent{color:var(--accent);}
.meta-value.green{color:var(--green);}
.meta-value.warn{color:var(--warn);}
.tab-row{
  display:flex;
  gap:6px;
  padding:8px 10px;
  background:var(--surface);
  border-bottom:1px solid var(--border);
  position:sticky;
  top:50px;
  z-index:90;
}
.tab{
  padding:7px 14px;
  border-radius:8px;
  font-size:13px;
  font-weight:950;
  background:var(--surface2);
  border:1px solid var(--border);
  color:#9aa7c4;
  cursor:pointer;
  user-select:none;
}
.tab.active{
  background:rgba(247,200,74,0.16);
  border-color:rgba(247,200,74,0.45);
  color:var(--accent);
}
.controls{
  display:flex;
  align-items:center;
  gap:8px;
  flex-wrap:wrap;
  padding:8px 10px;
  background:#081525;
  border-bottom:1px solid var(--border);
}
.control-label{font-size:11px;font-weight:900;color:var(--muted2);}
select,input{
  background:var(--surface);
  color:var(--text);
  border:1px solid var(--border2);
  border-radius:8px;
  padding:6px 8px;
  font-size:12px;
  font-weight:800;
  min-width:120px;
}
input{min-width:180px;}
.notice{
  margin-top:10px;
  padding:8px 10px;
  border:1px solid rgba(255,176,32,0.35);
  background:rgba(255,176,32,0.08);
  color:#ffd27a;
  border-radius:8px;
  font-size:12px;
  font-weight:800;
  line-height:1.45;
}
.notice.hidden{display:none;}
.main{
  padding:10px 0 18px;
}
.main > .table-wrap{
  margin-left:0;
  margin-right:0;
}
.table-wrap{
  background:#0c1627;
  border:1px solid var(--border);
  border-radius:12px;
  overflow:auto;
  box-shadow:0 12px 28px rgba(0,0,0,0.22), 0 0 0 1px #0a1728;
}
table{width:100%;border-collapse:collapse;min-width:920px;}
th{
  position:sticky;
  top:0;
  z-index:10;
  background:#162541;
  color:#dfe8ff;
  font-size:11px;
  font-weight:950;
  text-align:right;
  border-bottom:1px solid var(--border2);
  padding:7px 7px;
  white-space:nowrap;
}
th:first-child,th:nth-child(2),th:nth-child(3),th:nth-child(4){text-align:left;}
td{
  padding:6px 6px;
  border-bottom:1px solid #12213a;
  font-size:13px;
  font-weight:800;
  text-align:right;
  white-space:nowrap;
}
td:first-child,td:nth-child(2),td:nth-child(3),td:nth-child(4){text-align:left;}
tr:hover td{background:rgba(255,255,255,0.025);}
.rank{
  font-size:17px;
  font-weight:950;
  color:var(--gold);
  font-family:ui-monospace,SFMono-Regular,Menlo,monospace;
}
.rank.top3{color:#fff;text-shadow:0 0 10px rgba(247,200,74,0.6);}
.hts{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  min-width:32px;
  padding:2px 6px;
  border-radius:7px;
  font-size:12px;
  font-weight:950;
  color:#07111f;
  background:var(--accent);
}
.hts.none{
  color:var(--muted2);
  background:#17233a;
  border:1px solid #263858;
}
.industry-en{font-size:13px;font-weight:950;color:#fff;max-width:330px;overflow:hidden;text-overflow:ellipsis;}
.industry-kr{font-size:11px;font-weight:900;color:#9fc4ee;margin-top:1px;}
.good{color:var(--up)!important;}
.bad{color:var(--down)!important;}
.flat{color:#9aa7c4!important;}
.mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace;}
.small{font-size:11px;color:var(--muted);font-weight:800;}
.badge{
  display:inline-flex;
  align-items:center;
  justify-content:center;
  padding:2px 6px;
  border-radius:7px;
  background:#17233a;
  border:1px solid #263858;
  color:#b7c4e0;
  font-size:11px;
  font-weight:900;
}
.badge.ok{background:rgba(127,217,127,0.1);border-color:rgba(127,217,127,0.35);color:var(--green);}
.badge.no{background:rgba(255,176,32,0.08);border-color:rgba(255,176,32,0.32);color:#ffd27a;}
.empty{
  padding:30px 10px;
  text-align:center;
  color:var(--muted2);
  font-size:13px;
  font-weight:900;
}
.overlay{
  position:fixed;
  inset:0;
  background:rgba(7,17,31,0.96);
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  z-index:999;
  gap:14px;
}
.overlay.hidden{display:none;}
.spin{
  width:42px;
  height:42px;
  border:3px solid var(--border);
  border-top-color:var(--accent);
  border-radius:50%;
  animation:spin 0.6s linear infinite;
}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:13px;font-weight:900;color:var(--accent);}
.footer{
  text-align:center;
  font-size:11px;
  color:var(--muted);
  padding:10px;
  border-top:1px solid var(--border);
  background:var(--surface);
}
@media(max-width:760px){
  :root{--pageMax:100%;}
  body{font-size:12px;}
  .hdr,
  .meta,
  .tab-row,
  .controls,
  .footer{
    border-left:0;
    border-right:0;
    border-radius:0;
  }
  .main{padding-left:8px;padding-right:8px;}
  .hdr-title{font-size:16px;}
  .hdr-sub{font-size:9px;}
  .btn{padding:6px 8px;font-size:11px;}
  .meta{grid-template-columns:repeat(2,1fr);}
  .tab-row{top:49px;overflow-x:auto;}
  .tab{flex-shrink:0;}
  .controls{overflow-x:auto;flex-wrap:nowrap;}
  table{min-width:820px;}
}
</style>
</head>
<body>

<div class="overlay" id="ov">
  <div class="spin"></div>
  <div class="spin-txt" id="ovTxt">데이터 불러오는 중...</div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📡 GICS74 미장 자금흐름 레이더</div>
    <div class="hdr-sub" id="hdrSub">미장 74개 Industry · HTS 관종 매칭 62개 · 국장 종목 매핑 제거</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn" id="refBtn" onclick="loadData(true)">🔄 새로고침</button>
  </div>
</div>

<div class="meta">
  <div class="meta-card"><div class="meta-label">세션</div><div class="meta-value accent" id="mSession">—</div></div>
  <div class="meta-card"><div class="meta-label">본장 기준일</div><div class="meta-value" id="mDate">—</div></div>
  <div class="meta-card"><div class="meta-label">본장 확정</div><div class="meta-value" id="mLocked">—</div></div>
  <div class="meta-card"><div class="meta-label">업데이트</div><div class="meta-value" id="mUpdated">—</div></div>
  <div class="meta-card"><div class="meta-label">조회 상태</div><div class="meta-value" id="mCounts">—</div></div>
</div>

<div class="tab-row">
  <div class="tab active" data-tab="regular" onclick="setTab('regular')">🏁 본장 자금흐름</div>
  <div class="tab" data-tab="live" onclick="setTab('live')">⚡ 실시간 흐름</div>
  <div class="tab" data-tab="stocks" onclick="setTab('stocks')">🔎 미장 종목</div>
  <div class="tab" data-tab="status" onclick="setTab('status')">🧪 데이터 상태</div>
</div>

<div class="controls" id="controls"></div>
<div class="notice hidden" id="notice"></div>
<div class="main" id="main"></div>
<div class="footer" id="footer"></div>

<script>
let sectors = [];
let prices = null;
let activeTab = 'regular';
let sortMode = 'weighted';
let stockMode = 'regular';
let stockIndustry = '__ALL__';
let stockSearch = '';

const SESSION_LABEL = {
  pre: '프리장',
  regular: '본장',
  after: '애프터장',
  closed: '장마감/휴장'
};

function cls(v){
  if(v > 0) return 'good';
  if(v < 0) return 'bad';
  return 'flat';
}
function fmtPct(v){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  const sign = v > 0 ? '+' : '';
  return `${sign}${Number(v).toFixed(2)}%`;
}
function fmtNum(v, digits=0){
  if(v === null || v === undefined || !isFinite(v)) return '—';
  return Number(v).toLocaleString('en-US', {maximumFractionDigits:digits, minimumFractionDigits:digits});
}
function fmtMoney(v){
  if(v === null || v === undefined || !isFinite(v) || v <= 0) return '—';
  const abs = Math.abs(v);
  if(abs >= 1e12) return `$${(v/1e12).toFixed(2)}T`;
  if(abs >= 1e9) return `$${(v/1e9).toFixed(2)}B`;
  if(abs >= 1e6) return `$${(v/1e6).toFixed(1)}M`;
  return `$${fmtNum(v,0)}`;
}
function esc(s){
  return String(s ?? '').replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));
}
function cacheBust(url, force=false){
  return force ? `${url}?t=${Date.now()}` : `${url}?t=${Math.floor(Date.now()/60000)}`;
}
async function fetchJSON(url, force=false){
  const res = await fetch(cacheBust(url, force), {cache:'no-store'});
  if(!res.ok) throw new Error(`${url} ${res.status}`);
  return await res.json();
}
function getQuote(ticker, displayTicker){
  const us = prices?.us || {};
  return us[ticker] || us[displayTicker] || null;
}
function getField(q, mode){
  if(!q) return null;

  if(mode === 'regular'){
    const price = Number(q.regular_price ?? q.price ?? q.live_price);
    const change = Number(q.regular_change ?? q.change ?? q.live_change);
    const volume = Number(q.regular_volume ?? q.volume ?? 0);
    let dollar = Number(q.regular_dollar_volume ?? 0);
    if(!dollar && price && volume) dollar = price * volume;
    return {price, change, volume, dollar, weightType:'거래대금'};
  }

  const price = Number(q.live_price ?? q.regular_price ?? q.price);
  const change = Number(q.live_change ?? q.regular_change ?? q.change);
  const liveVol = Number(q.live_volume ?? 0);
  const regularPrice = Number(q.regular_price ?? q.price ?? 0);
  const regularVol = Number(q.regular_volume ?? q.volume ?? 0);

  // 1순위: 현재 세션에서 실제로 잡힌 실시간 거래대금
  let liveDollar = Number(q.live_dollar_volume ?? 0);
  if(!liveDollar && price && liveVol) liveDollar = price * liveVol;

  // 2순위: 프리/애프터 거래량이 안 잡힐 때는 최근 본장 거래대금으로 대체
  let regularDollar = Number(q.regular_dollar_volume ?? 0);
  if(!regularDollar && regularPrice && regularVol) regularDollar = regularPrice * regularVol;

  if(liveDollar > 0){
    return {price, change, volume:liveVol, dollar:liveDollar, weightType:'실시간거래대금'};
  }

  if(regularDollar > 0){
    return {price, change, volume:liveVol, dollar:regularDollar, weightType:'전일거래대금대체'};
  }

  // 3순위: 그래도 없을 때만 시총으로 대체
  return {price, change, volume:liveVol, dollar:0, weightType:'시총대체'};
}
function sectorMetrics(mode='regular'){
  const rows = [];

  for(const s of sectors){
    let valid = 0;
    let up = 0;
    let down = 0;
    let flat = 0;
    let weightedSum = 0;
    let weightSum = 0;
    let dollarSum = 0;
    let positiveDollar = 0;
    let negativeDollar = 0;
    let marketCapSum = 0;
    let liveDollarCount = 0;
    let regularFallbackCount = 0;
    let marketCapFallbackCount = 0;

    for(const t of (s.tickers || [])){
      const q = getQuote(t.ticker, t.display_ticker);
      const f = getField(q, mode);
      const marketCap = Number(t.market_cap_usd || q?.market_cap_usd || 0);
      marketCapSum += marketCap;

      if(!q || !f || !isFinite(f.change)) continue;

      valid += 1;
      if(f.change > 0) up += 1;
      else if(f.change < 0) down += 1;
      else flat += 1;

      const weight = f.dollar > 0 ? f.dollar : marketCap;
      if(weight > 0){
        weightedSum += f.change * weight;
        weightSum += weight;
      }

      if(f.weightType === '실시간거래대금') liveDollarCount += 1;
      else if(f.weightType === '전일거래대금대체') regularFallbackCount += 1;
      else if(f.weightType === '시총대체') marketCapFallbackCount += 1;

      if(f.dollar > 0){
        dollarSum += f.dollar;
        if(f.change > 0) positiveDollar += f.dollar;
        else if(f.change < 0) negativeDollar += f.dollar;
      }
    }

    const weightedChange = weightSum > 0 ? weightedSum / weightSum : 0;
    const breadth = valid > 0 ? up / valid : 0;
    const downBreadth = valid > 0 ? down / valid : 0;
    const netDollar = positiveDollar - negativeDollar;
    const dollarBias = dollarSum > 0 ? netDollar / dollarSum * 100 : null;

    rows.push({
      id:s.id,
      gics11:s.gics11,
      industry:s.industry,
      kr:s.kr,
      hts_no:s.hts_no,
      hts_name:s.hts_name,
      has_kr_watchlist:!!s.has_kr_watchlist,
      ticker_count:(s.tickers || []).length,
      valid,
      up,
      down,
      flat,
      weighted_change:weightedChange,
      breadth,
      down_breadth:downBreadth,
      dollar_volume:dollarSum,
      positive_dollar:positiveDollar,
      negative_dollar:negativeDollar,
      net_dollar:netDollar,
      dollar_bias:dollarBias,
      market_cap_usd:marketCapSum,
      live_dollar_count:liveDollarCount,
      regular_fallback_count:regularFallbackCount,
      marketcap_fallback_count:marketCapFallbackCount,
      weight_note: mode === 'regular'
        ? '거래대금'
        : (liveDollarCount > 0
            ? '실시간거래대금'
            : (regularFallbackCount > 0 ? '전일거래대금대체' : '시총대체'))
    });
  }

  const sorter = {
    weighted:(a,b)=> (b.weighted_change - a.weighted_change) || (b.dollar_volume - a.dollar_volume),
    dollar:(a,b)=> (b.dollar_volume - a.dollar_volume) || (b.weighted_change - a.weighted_change),
    breadth:(a,b)=> (b.breadth - a.breadth) || (b.weighted_change - a.weighted_change),
    netdollar:(a,b)=> (b.net_dollar - a.net_dollar) || (b.weighted_change - a.weighted_change),
    hts:(a,b)=> {
      const ax = a.hts_no === null || a.hts_no === undefined ? 999 : Number(a.hts_no);
      const bx = b.hts_no === null || b.hts_no === undefined ? 999 : Number(b.hts_no);
      return ax - bx;
    }
  }[sortMode] || ((a,b)=>b.weighted_change-a.weighted_change);

  rows.sort(sorter);
  rows.forEach((r,i)=>r.rank=i+1);
  return rows;
}
function stockRows(){
  const rows = [];

  for(const s of sectors){
    if(stockIndustry !== '__ALL__' && s.industry !== stockIndustry) continue;

    for(const t of (s.tickers || [])){
      const q = getQuote(t.ticker, t.display_ticker);
      const f = getField(q, stockMode);
      const marketCap = Number(t.market_cap_usd || q?.market_cap_usd || 0);
      if(!q || !f || !isFinite(f.change)) continue;

      const dollar = f.dollar || 0;
      const weight = dollar > 0 ? dollar : marketCap;
      const contrib = f.change * weight;

      const needle = `${t.ticker} ${t.display_ticker} ${t.name} ${s.industry} ${s.kr}`.toLowerCase();
      if(stockSearch && !needle.includes(stockSearch.toLowerCase())) continue;

      rows.push({
        industry:s.industry,
        kr:s.kr,
        hts_no:s.hts_no,
        has_kr_watchlist:!!s.has_kr_watchlist,
        ticker:t.ticker,
        display_ticker:t.display_ticker || t.ticker,
        name:t.name,
        price:f.price,
        change:f.change,
        volume:f.volume,
        dollar_volume:dollar,
        market_cap_usd:marketCap,
        contribution:contrib,
        source:f.weightType
      });
    }
  }

  rows.sort((a,b)=> (b.dollar_volume - a.dollar_volume) || (b.contribution - a.contribution) || (b.market_cap_usd - a.market_cap_usd));
  return rows;
}
function sessionText(){
  const s = prices?.session || '—';
  return SESSION_LABEL[s] || s;
}
function updatedText(){
  const t = prices?.updated_at_kst || prices?.updated_at;
  if(!t) return '—';
  try{
    const d = new Date(t);
    return d.toLocaleString('ko-KR', {hour12:false});
  }catch(e){ return t; }
}
function setMeta(){
  document.getElementById('mSession').textContent = sessionText();
  document.getElementById('mDate').textContent = prices?.date_key || '—';

  const locked = prices?.regular_final_locked;
  const lockEl = document.getElementById('mLocked');
  lockEl.textContent = locked ? '고정됨' : '본장 진행중';
  lockEl.className = 'meta-value ' + (locked ? 'green' : 'warn');

  document.getElementById('mUpdated').textContent = updatedText();

  const c = prices?.counts || {};
  document.getElementById('mCounts').textContent = `${c.ok ?? 0}/${c.symbols ?? 0} OK · 실패 ${c.failed ?? 0}`;
}
function setNotice(){
  const el = document.getElementById('notice');
  const msgs = [];

  if(!String(prices?.schema_version || '').startsWith('gics74_prices_v2')){
    msgs.push('현재 cache/prices.json이 구버전일 수 있습니다. GitHub Actions가 한 번 실행된 뒤 정상 데이터로 바뀝니다.');
  }
  if(activeTab === 'live'){
    const liveRows = sectorMetrics('live');
    const noLiveDollar = liveRows.filter(r=>r.live_dollar_count===0).length;
    if(noLiveDollar > 0){
      msgs.push('Yahoo에서 프리/애프터 거래량이 안 잡히는 섹터는 실시간 탭에서 전일 본장 거래대금으로 대체 계산합니다. 전일 거래대금도 없을 때만 시총가중을 씁니다.');
    }
  }
  if(activeTab === 'regular' && prices?.regular_final_locked === false){
    msgs.push('현재 본장 진행 중이면 본장 자금흐름은 아직 확정값이 아니라 실시간으로 변합니다.');
  }

  if(msgs.length){
    el.innerHTML = msgs.map(esc).join('<br>');
    el.classList.remove('hidden');
  }else{
    el.classList.add('hidden');
    el.innerHTML = '';
  }
}
function setControls(){
  const c = document.getElementById('controls');

  if(activeTab === 'regular' || activeTab === 'live'){
    c.innerHTML = `
      <span class="control-label">정렬</span>
      <select id="sortSel" onchange="sortMode=this.value; render()">
        <option value="weighted" ${sortMode==='weighted'?'selected':''}>거래대금가중 등락률</option>
        <option value="dollar" ${sortMode==='dollar'?'selected':''}>거래대금 총액</option>
        <option value="breadth" ${sortMode==='breadth'?'selected':''}>상승비율</option>
        <option value="netdollar" ${sortMode==='netdollar'?'selected':''}>순매수성 거래대금</option>
        <option value="hts" ${sortMode==='hts'?'selected':''}>HTS 번호순</option>
      </select>
      <span class="small">기본은 섹터 자금흐름용: 거래대금가중 등락률</span>
    `;
    return;
  }

  if(activeTab === 'stocks'){
    const opts = sectors.map(s=>`<option value="${esc(s.industry)}" ${stockIndustry===s.industry?'selected':''}>${s.hts_no ? s.hts_no+' ' : '— '}${esc(s.kr)} · ${esc(s.industry)}</option>`).join('');
    c.innerHTML = `
      <span class="control-label">기준</span>
      <select onchange="stockMode=this.value; render()">
        <option value="regular" ${stockMode==='regular'?'selected':''}>본장 기준</option>
        <option value="live" ${stockMode==='live'?'selected':''}>실시간 기준</option>
      </select>
      <span class="control-label">섹터</span>
      <select onchange="stockIndustry=this.value; render()">
        <option value="__ALL__" ${stockIndustry==='__ALL__'?'selected':''}>전체 섹터</option>
        ${opts}
      </select>
      <input placeholder="티커/종목/섹터 검색" value="${esc(stockSearch)}" oninput="stockSearch=this.value; renderStocks()">
    `;
    return;
  }

  c.innerHTML = `<span class="small">데이터 상태 확인용 탭입니다.</span>`;
}
function renderSectorTable(mode){

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>순위</th>
            <th>HTS</th>
            <th>섹터</th>
            <th>매칭</th>
            <th>${label} 가중등락</th>
            <th>상승비율</th>
            <th>거래대금</th>
            <th>순매수성</th>
            <th>종목</th>
            <th>성공</th>
            <th>가중</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td><span class="rank ${r.rank<=3?'top3':''}">${r.rank}</span></td>
              <td>${r.hts_no ? `<span class="hts">${r.hts_no}</span>` : `<span class="hts none">—</span>`}</td>
              <td>
                <div class="industry-en">${esc(r.industry)}</div>
                <div class="industry-kr">${esc(r.kr)}</div>
              </td>
              <td>${r.has_kr_watchlist ? '<span class="badge ok">HTS</span>' : '<span class="badge no">미장만</span>'}</td>
              <td class="${cls(r.weighted_change)} mono">${fmtPct(r.weighted_change)}</td>
              <td class="mono">${fmtPct(r.breadth*100)} <span class="small">(${r.up}/${r.valid})</span></td>
              <td class="mono">${fmtMoney(r.dollar_volume)}</td>
              <td class="${cls(r.net_dollar)} mono">${fmtMoney(r.net_dollar)}</td>
              <td class="mono">${r.ticker_count}</td>
              <td class="mono">${r.valid}</td>
              <td><span class="badge ${r.weight_note==='시총대체'?'no':'ok'}">${esc(r.weight_note)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('main').innerHTML = html;
}
function renderStocks(){
  const rows = stockRows();

  const html = `
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>섹터</th>
            <th>HTS</th>
            <th>티커</th>
            <th>종목명</th>
            <th>등락률</th>
            <th>가격</th>
            <th>거래대금</th>
            <th>거래량</th>
            <th>시총</th>
            <th>기여도</th>
          </tr>
        </thead>
        <tbody>
          ${rows.map(r=>`
            <tr>
              <td>
                <div class="industry-kr">${esc(r.kr)}</div>
                <div class="small">${esc(r.industry)}</div>
              </td>
              <td>${r.hts_no ? `<span class="hts">${r.hts_no}</span>` : `<span class="hts none">—</span>`}</td>
              <td class="mono">${esc(r.display_ticker)}</td>
              <td>${esc(r.name)}</td>
              <td class="${cls(r.change)} mono">${fmtPct(r.change)}</td>
              <td class="mono">${fmtNum(r.price,2)}</td>
              <td class="mono">${fmtMoney(r.dollar_volume)}</td>
              <td class="mono">${fmtNum(r.volume,0)}</td>
              <td class="mono">${fmtMoney(r.market_cap_usd)}</td>
              <td class="${cls(r.contribution)} mono">${fmtMoney(r.contribution)}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('main').innerHTML = rows.length ? html : '<div class="empty">표시할 종목이 없습니다.</div>';

function renderStatus(){
  const failures = prices?.failures || {};
  const failKeys = Object.keys(failures);
  const c = prices?.counts || {};
  const schema = prices?.schema_version || 'legacy';

  const rows = [
    ['schema_version', schema],
    ['session', `${prices?.session || '—'} (${sessionText()})`],
    ['date_key', prices?.date_key || '—'],
    ['regular_final_locked', String(prices?.regular_final_locked)],
    ['updated_at', prices?.updated_at || '—'],
    ['updated_at_kst', prices?.updated_at_kst || '—'],
    ['sectors', c.sectors ?? sectors.length],
    ['symbols', c.symbols ?? '—'],
    ['ok', c.ok ?? '—'],
    ['failed', c.failed ?? failKeys.length],
  ];

  const html = `
    <div class="table-wrap" style="margin-bottom:10px;">
      <table>
        <thead><tr><th>항목</th><th>값</th></tr></thead>
        <tbody>
          ${rows.map(([k,v])=>`<tr><td>${esc(k)}</td><td class="mono">${esc(v)}</td></tr>`).join('')}
        </tbody>
      </table>
    </div>
    <div class="table-wrap">
      <table>
        <thead><tr><th>실패 티커</th><th>사유</th></tr></thead>
        <tbody>
          ${failKeys.length ? failKeys.map(k=>`<tr><td class="mono">${esc(k)}</td><td>${esc(failures[k])}</td></tr>`).join('') : '<tr><td colspan="2" class="empty">실패 티커 없음</td></tr>'}
        </tbody>
      </table>
    </div>
  `;
  document.getElementById('main').innerHTML = html;
}
function render(){
  setMeta();
  setControls();
  setNotice();

  if(activeTab === 'regular') renderSectorTable('regular');
  else if(activeTab === 'live') renderSectorTable('live');
  else if(activeTab === 'stocks') renderStocks();
  else renderStatus();

  const rows = sectorMetrics('regular');
  const matched = sectors.filter(s=>s.has_kr_watchlist).length;
  document.getElementById('footer').textContent =
    `GICS74 ${sectors.length}개 · HTS 매칭 ${matched}개 · 미장 티커 ${(prices?.counts?.symbols ?? rows.reduce((a,r)=>a+r.ticker_count,0)).toLocaleString()}개`;
}
function setTab(tab){
  activeTab = tab;
  document.querySelectorAll('.tab').forEach(el=>el.classList.toggle('active', el.dataset.tab === tab));
  render();
}
function toCSV(rows){
  return rows.map(row => row.map(v => {
    const s = String(v ?? '');
    return /[",\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(',')).join('\n');
}
function downloadCSV(){
  let rows = [];
  let filename = 'gics74_radar.csv';

  if(activeTab === 'stocks'){
    const data = stockRows();
    rows.push(['섹터','한글명','HTS','티커','종목명','등락률','가격','거래대금','거래량','시총','기여도']);
    for(const r of data){
      rows.push([r.industry,r.kr,r.hts_no||'',r.display_ticker,r.name,r.change,r.price,r.dollar_volume,r.volume,r.market_cap_usd,r.contribution]);
    }
    filename = `gics74_stocks_${stockMode}_${prices?.date_key || 'date'}.csv`;
  }else{
    const mode = activeTab === 'live' ? 'live' : 'regular';
    const data = sectorMetrics(mode);
    rows.push(['순위','HTS번호','한글명','GICS11','GICS74','HTS매칭','가중등락률','상승비율','상승종목','성공종목','전체종목','거래대금','순매수성거래대금','가중방식']);
    for(const r of data){
      rows.push([r.rank,r.hts_no||'',r.kr,r.gics11,r.industry,r.has_kr_watchlist?'Y':'N',r.weighted_change,r.breadth,r.up,r.valid,r.ticker_count,r.dollar_volume,r.net_dollar,r.weight_note]);
    }
    filename = `gics74_sector_${mode}_${prices?.date_key || 'date'}.csv`;
  }

  const blob = new Blob(['\ufeff' + toCSV(rows)], {type:'text/csv;charset=utf-8'});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}
async function loadData(force=false){
  const btn = document.getElementById('refBtn');
  const ov = document.getElementById('ov');
  btn.classList.add('loading');
  ov.classList.remove('hidden');

  try{
    const [sectorData, priceData] = await Promise.all([
      fetchJSON('./sectors_data.json', force),
      fetchJSON('./cache/prices.json', force),
    ]);

    sectors = Array.isArray(sectorData) ? sectorData : [];
    prices = priceData || {};

    if(!sectors.length) throw new Error('sectors_data.json이 비어 있습니다.');
    if(!prices.us) throw new Error('cache/prices.json에 us 데이터가 없습니다.');

    render();
  }catch(e){
    console.error(e);
    document.getElementById('main').innerHTML = `<div class="empty">데이터 로딩 실패<br>${esc(e.message)}</div>`;
  }finally{
    btn.classList.remove('loading');
    ov.classList.add('hidden');
  }
}
loadData(false);
</script>
