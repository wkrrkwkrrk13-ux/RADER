<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#0d0d14">
<title>미장 레이더</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;}
:root{
  --bg:#0d0d14;
  --surface:#13131f;
  --border:#222235;
  --text:#d8d8f0;
  --muted:#55556a;
  --up:#ff3348;
  --up-bg:rgba(255,51,72,0.13);
  --down:#1a8cff;
  --down-bg:rgba(26,140,255,0.13);
  --flat:#555570;
  --accent:#f0c040;
}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'Malgun Gothic',sans-serif;font-size:11px;}

/* 헤더 */
.hdr{
  position:sticky;top:0;z-index:100;
  background:var(--bg);border-bottom:1px solid var(--border);
  padding:7px 10px;
  display:flex;align-items:center;justify-content:space-between;gap:8px;
}
.hdr-title{font-size:14px;font-weight:700;color:var(--accent);}
.hdr-sub{font-size:10px;color:var(--muted);}
.hdr-right{display:flex;gap:6px;align-items:center;}
.btn{
  background:var(--surface);border:1px solid var(--border);
  color:var(--text);padding:5px 10px;border-radius:6px;
  font-size:11px;cursor:pointer;white-space:nowrap;
}
.btn:active{opacity:0.7;}
.btn.loading{opacity:0.4;pointer-events:none;}
.btn-csv{background:rgba(240,192,64,0.15);border-color:rgba(240,192,64,0.4);color:var(--accent);}

/* 날짜 */
.date-row{padding:5px 10px;display:flex;align-items:center;gap:6px;border-bottom:1px solid var(--border);}
.date-input{background:var(--surface);border:1px solid var(--border);color:var(--text);padding:4px 8px;border-radius:5px;font-size:11px;}

/* 섹터 순위 바 */
.rank-bar{
  padding:6px 10px;display:flex;gap:5px;
  overflow-x:auto;scrollbar-width:none;
  border-bottom:1px solid var(--border);
  flex-wrap:wrap;
}
.rank-bar::-webkit-scrollbar{display:none;}
.rank-chip{
  flex-shrink:0;padding:3px 7px;border-radius:4px;
  font-size:10px;font-weight:700;cursor:pointer;
  border:1px solid transparent;
}
.rank-chip.up{background:var(--up-bg);border-color:rgba(255,51,72,0.3);color:var(--up);}
.rank-chip.down{background:var(--down-bg);border-color:rgba(26,140,255,0.3);color:var(--down);}
.rank-chip.flat{background:var(--surface);border-color:var(--border);color:var(--muted);}

/* 필터 */
.filters{padding:5px 10px;display:flex;gap:5px;border-bottom:1px solid var(--border);}
.ftab{padding:3px 10px;border-radius:4px;font-size:10px;font-weight:600;background:var(--surface);border:1px solid var(--border);color:var(--muted);cursor:pointer;}
.ftab.active{background:var(--accent);border-color:var(--accent);color:#000;}

/* 메인 그리드 */
.main{padding:8px 10px 60px;display:flex;flex-direction:column;gap:8px;}

/* 섹터 카드 */
.sc{background:var(--surface);border:1px solid var(--border);border-radius:8px;overflow:hidden;}
.sc-hdr{
  padding:5px 9px;
  display:flex;align-items:center;justify-content:space-between;
  background:#17172a;border-bottom:1px solid var(--border);
  cursor:pointer;
}
.sc-name{font-size:11px;font-weight:700;color:var(--accent);}
.sc-avg{font-size:12px;font-weight:800;}

/* 종목 그리드 */
.tk-grid{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:1px;background:var(--border);
}
@media(max-width:600px){
  .tk-grid{grid-template-columns:repeat(2,1fr);}
}
@media(min-width:1200px){
  .tk-grid{grid-template-columns:repeat(8,1fr);}
}

.tk{
  padding:5px 7px;
  background:var(--surface);
  display:flex;flex-direction:column;gap:1px;
}
.tk.up-bg{background:var(--up-bg);}
.tk.dn-bg{background:var(--down-bg);}

.tk-sym{font-size:12px;font-weight:800;letter-spacing:-0.3px;}
.tk-chg{font-size:13px;font-weight:800;}
.tk-desc{font-size:9px;color:var(--muted);line-height:1.3;}
.tk-kr{font-size:9px;color:#7777aa;line-height:1.3;}
.tk-vol{font-size:9px;color:var(--muted);}

.up{color:var(--up);}
.dn{color:var(--down);}
.fl{color:var(--flat);}

/* 로딩 */
.overlay{position:fixed;inset:0;background:rgba(13,13,20,0.92);display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:999;gap:14px;}
.overlay.hidden{display:none;}
.spin{width:36px;height:36px;border:3px solid var(--border);border-top-color:var(--accent);border-radius:50%;animation:spin 0.7s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
.spin-txt{font-size:12px;color:var(--muted);}

.footer{text-align:center;font-size:10px;color:var(--muted);padding:6px;}
</style>
</head>
<body>

<div class="overlay" id="ov">
  <div class="spin"></div>
  <div class="spin-txt" id="ovTxt">데이터 수집 중...</div>
</div>

<div class="hdr">
  <div>
    <div class="hdr-title">📡 미장 레이더</div>
    <div class="hdr-sub" id="hdrSub">32섹터 · 국장 매핑</div>
  </div>
  <div class="hdr-right">
    <button class="btn btn-csv" onclick="downloadCSV()">⬇ CSV</button>
    <button class="btn" id="refBtn" onclick="loadData()">🔄 새로고침</button>
  </div>
</div>

<div class="date-row">
  <span style="color:var(--muted);font-size:10px;">기준일:</span>
  <input type="date" class="date-input" id="dateInput">
  <button class="btn" onclick="loadData()" style="padding:4px 8px;">조회</button>
</div>

<div class="rank-bar" id="rankBar"></div>

<div class="filters">
  <div class="ftab active" onclick="setFilter('all',this)">전체</div>
  <div class="ftab" onclick="setFilter('up',this)">상승↑</div>
  <div class="ftab" onclick="setFilter('dn',this)">하락↓</div>
</div>

<div class="main" id="main"></div>
<div class="footer" id="footer"></div>

let allData={}, curFilter='all';

function fmtC(c){if(c==null)return'N/A';const s=c>=0?'+':'';return s+c.toFixed(1)+'%';}
function fmtV(v){if(!v)return'';if(v>=1e9)return(v/1e9).toFixed(1)+'B';if(v>=1e6)return(v/1e6).toFixed(1)+'M';if(v>=1e3)return(v/1e3).toFixed(0)+'K';return v;}
function cls(c){if(c==null)return'fl';return c>0?'up':c<0?'dn':'fl';}
function bgCls(c){if(c==null)return'';return c>0.5?'up-bg':c<-0.5?'dn-bg':'';}

function sectorAvg(tickers){
  const vals=tickers.map(([s])=>allData[s]?.change).filter(v=>v!=null);
  return vals.length?vals.reduce((a,b)=>a+b,0)/vals.length:null;
}

function renderRankBar(){
  const avgs=SECTORS.map(s=>({n:s.n.split('.').pop().trim().substring(0,10),avg:sectorAvg(s.t)}))
    .filter(x=>x.avg!=null).sort((a,b)=>b.avg-a.avg);
  document.getElementById('rankBar').innerHTML=avgs.map(x=>{
    const c=x.avg>0?'up':x.avg<0?'down':'flat';
    const sign=x.avg>=0?'+':'';
    return `<div class="rank-chip ${c}">${x.n} ${sign}${x.avg.toFixed(1)}%</div>`;
  }).join('');
}

function renderMain(){
  const container=document.getElementById('main');
  container.innerHTML=SECTORS.map(s=>{
    const avg=sectorAvg(s.t);
    if(curFilter==='up'&&(avg==null||avg<=0))return'';
    if(curFilter==='dn'&&(avg==null||avg>=0))return'';
    const avgC=cls(avg);
    const sign=avg!=null&&avg>=0?'+':'';
    const avgStr=avg!=null?sign+avg.toFixed(1)+'%':'N/A';
    const rows=s.t.map(([sym,desc,kr])=>{
      const d=allData[sym];
      const c=d?.change;
      const p=d?.price;
      const v=d?.volume;
      const cc=cls(c);
      const bg=bgCls(c);
      const pStr=p!=null?'$'+p.toFixed(p>100?0:2):'';
      return `<div class="tk ${bg}">
        <span class="tk-sym ${cc}">${sym}</span>
        <span class="tk-chg ${cc}">${fmtC(c)}</span>
        <span class="tk-desc">${desc}</span>
        <span class="tk-kr">→ ${kr}</span>
        <span class="tk-vol">${pStr} ${fmtV(v)}</span>
      </div>`;
    }).join('');
    return `<div class="sc">
      <div class="sc-hdr">
        <span class="sc-name">${s.n}</span>
        <span class="sc-avg ${avgC}">${avgStr}</span>
      </div>
      <div class="tk-grid">${rows}</div>
    </div>`;
  }).join('');
}

function setFilter(f,btn){
  curFilter=f;
  document.querySelectorAll('.ftab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderMain();
}

// ── API 호출 ──
async function fetchOne(sym){
  // Vercel API 경유
  try{
    const r=await fetch(`/api/quote?symbol=${sym}`);
    if(r.ok){
      const d=await r.json();
      if(d.price)return{price:d.price,change:d.change,volume:d.volume};
    }
  }catch{}
  // 직접 호출 폴백
  const urls=[
    `https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d&corsDomain=finance.yahoo.com`,
    `https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`,
  ];
  for(const url of urls){
    try{
      const r=await fetch(url,{headers:{'Accept':'application/json'},mode:'cors'});
      if(!r.ok)continue;
      const d=await r.json();
      const res=d?.chart?.result?.[0];
      if(!res)continue;
      const closes=res.indicators?.quote?.[0]?.close?.filter(v=>v!=null);
      const vols=res.indicators?.quote?.[0]?.volume?.filter(v=>v!=null);
      if(!closes||closes.length<2)continue;
      const prev=closes[closes.length-2],last=closes[closes.length-1];
      return{price:last,change:((last-prev)/prev)*100,volume:vols?.[vols.length-1]||0};
    }catch{continue;}
  }
  // v7 폴백
  try{
    const r=await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${sym}`,{mode:'cors'});
    if(r.ok){
      const d=await r.json();
      const q=d?.quoteResponse?.result?.[0];
      if(q)return{price:q.regularMarketPrice,change:q.regularMarketChangePercent,volume:q.regularMarketVolume||0};
    }
  }catch{}
  return null;
}

async function fetchAll(syms){
  const res={};
  const batch=10;
  for(let i=0;i<syms.length;i+=batch){
    const b=syms.slice(i,i+batch);
    const results=await Promise.all(b.map(async s=>[s,await fetchOne(s)]));
    results.forEach(([s,v])=>res[s]=v);
    document.getElementById('ovTxt').textContent=`수집 중... ${Math.min(i+batch,syms.length)}/${syms.length}`;
    if(i+batch<syms.length)await new Promise(r=>setTimeout(r,150));
  }
  return res;
}

async function loadData(){
  const ov=document.getElementById('ov');
  const btn=document.getElementById('refBtn');
  ov.classList.remove('hidden');
  btn.classList.add('loading');
  try{
    const syms=[...new Set(SECTORS.flatMap(s=>s.t.map(t=>t[0])))];
    allData=await fetchAll(syms);
    const ok=Object.values(allData).filter(v=>v).length;
    document.getElementById('hdrSub').textContent=`32섹터 · ${ok}개 수집완료`;
    document.getElementById('footer').textContent=`업데이트: ${new Date().toLocaleString('ko-KR')} | ${ok}/${syms.length}개`;
    renderRankBar();
    renderMain();
  }catch(e){
    alert('오류: '+e.message);
  }finally{
    setTimeout(()=>ov.classList.add('hidden'),300);
    btn.classList.remove('loading');
  }
}

// CSV 다운로드
function downloadCSV(){
  const rows=[['날짜','섹터','티커','설명','국장매핑','등락률%','거래량','가격']];
  const today=new Date().toLocaleDateString('ko-KR');
  SECTORS.forEach(s=>{
    s.t.forEach(([sym,desc,kr])=>{
      const d=allData[sym];
      rows.push([today,s.n,sym,desc,kr,
        d?.change!=null?d.change.toFixed(2):'',
        d?.volume||'',
        d?.price!=null?d.price.toFixed(2):'']);
    });
  });
  const csv=rows.map(r=>r.map(v=>'"'+String(v).replace(/"/g,'""')+'"').join(',')).join('\n');
  const blob=new Blob(['\uFEFF'+csv],{type:'text/csv;charset=utf-8'});
  const a=document.createElement('a');
  a.href=URL.createObjectURL(blob);
  a.download=`us_radar_${new Date().toISOString().slice(0,10)}.csv`;
  a.click();
}

// 날짜 초기화
function initDate(){
  const inp=document.getElementById('dateInput');
  const d=new Date();
  const day=d.getDay();
  const off=day===0?2:day===6?1:1;
  d.setDate(d.getDate()-off);
  inp.value=d.toISOString().split('T')[0];
}

initDate();
loadData();
</script>
